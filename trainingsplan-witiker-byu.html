<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
  <title>Aneo Athletics – Trainingsplan Witiker BYU 2026</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.development.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.development.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --charcoal: #06060f;
      --surface-1: #0d0d1f;
      --surface-2: #14142a;
      --surface-3: #1c1c3a;
      --blue: #3377FF;
      --sage: #00E699;
      --blush: #FF1A75;
      --cloud: #FFFFFF;
      --border: rgba(255,255,255,0.15);
      --border-accent: rgba(51,119,255,0.6);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body { background: #080810; color: var(--cloud); font-family: 'Inter', system-ui, sans-serif; min-height: 100vh; -webkit-font-smoothing: antialiased; }
    .glow-blue  { box-shadow: none; }
    .glow-sage  { box-shadow: none; }
    .glow-blush { box-shadow: none; }
    .glow-gold  { box-shadow: none; }
    ::-webkit-scrollbar { width: 4px; height: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: rgba(246,246,244,0.12); border-radius: 2px; }
    .tag { display: inline-flex; align-items: center; padding: 2px 8px; border-radius: 9999px; font-size: 11px; font-weight: 600; letter-spacing: 0.04em; white-space: nowrap; }
    .modal-bg { position: fixed; inset: 0; background: rgba(0,0,0,0.8); backdrop-filter: blur(6px); z-index: 60; display: flex; align-items: flex-end; justify-content: center; padding: 0; }
    @media (min-width: 640px) { .modal-bg { align-items: center; padding: 16px; } }
    .modal-sheet { background: var(--surface-1); border: 1px solid var(--border); border-radius: 20px 20px 0 0; width: 100%; max-height: 92vh; overflow-y: auto; }
    @media (min-width: 640px) { .modal-sheet { max-width: 640px; border-radius: 20px; } }
    .pill { display: flex; align-items: center; gap: 8px; padding: 10px 12px; border-radius: 10px; cursor: pointer; transition: opacity 0.15s; user-select: none; -webkit-user-select: none; }
    .pill:active { opacity: 0.7; }
    .pill.dragging { opacity: 0.35; transform: scale(0.97); }
    .drop-zone { transition: border-color 0.15s, background 0.15s; }
    .drop-zone.over { border-color: var(--blue) !important; background: rgba(176,196,255,0.04) !important; }
    .week-tab { padding: 8px 16px; border-radius: 100px; font-size: 13px; font-weight: 600; white-space: nowrap; cursor: pointer; transition: all 0.15s; border: 1px solid transparent; }
    .week-tab.active { background: var(--cloud); color: var(--charcoal); }
    .week-tab:not(.active) { color: rgba(246,246,244,0.45); border-color: transparent; }
    .week-tab:not(.active):hover { color: var(--cloud); background: var(--surface-2); }
    .bottom-nav { position: fixed; bottom: 0; left: 0; right: 0; background: rgba(22,22,22,0.95); backdrop-filter: blur(12px); border-top: 1px solid var(--border); z-index: 40; padding: 8px 0 max(8px, env(safe-area-inset-bottom)); display: flex; }
    .bottom-nav-item { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 3px; padding: 4px 8px; cursor: pointer; -webkit-tap-highlight-color: transparent; }
    .bottom-nav-label { font-size: 10px; font-weight: 600; letter-spacing: 0.03em; }
    .exercise-row { border-bottom: 1px solid var(--border); }
    .exercise-row:last-child { border-bottom: none; }
    input[type=number]::-webkit-inner-spin-button, input[type=number]::-webkit-outer-spin-button { -webkit-appearance: none; }
    .progress-line { height: 2px; border-radius: 1px; }
    .aneo-logo { font-size: 18px; font-weight: 900; letter-spacing: -0.02em; }
    .aneo-logo span { color: var(--blue); }
    @media (max-width: 639px) { .desktop-only { display: none !important; } }
    @media (min-width: 640px) { .mobile-only { display: none !important; } .bottom-nav { display: none !important; } }
    .drag-handle { opacity: 0; transition: opacity 0.15s; cursor: grab; font-size: 14px; }
    .pill:hover .drag-handle { opacity: 0.5; }
    .drag-handle:active { cursor: grabbing; }
  </style>
</head>

function countdown() {
  const d = RACE_DATE - new Date();
  if(d<=0) return null;
  return { days: Math.floor(d/86400000), hours: Math.floor((d%86400000)/3600000) };
}
function weekKm(week, edits) {
  return week.days.reduce((s,d) => s + d.workouts.reduce((ss,w) => {
    if(w.type!=='run') return ss;
    const k = edits[`km_${w.id}`];
    return ss + (k!==undefined ? +k : (w.km||0));
  },0), 0);
}
function weekKmDone(week, edits, completed) {
  return week.days.reduce((s,d) => s + d.workouts.reduce((ss,w) => {
    if(w.type!=='run' || !completed.has(w.id)) return ss;
    const k = edits[`km_${w.id}`];
    return ss + (k!==undefined ? +k : (w.km||0));
  },0), 0);
}
function deepCopy(x) { return JSON.parse(JSON.stringify(x)); }

// ── TCX Generator (Garmin FR965) ─────────────────
// Builds a multi-step structured workout from a run's tags + duration
function buildTCXSteps(w) {
  const tags = w.tags || [];
  const totalSec = (w.duration || 60) * 60;
  let sid = 1;
  const step = (name, sec, loHR, hiHR, intensity='Active') =>
    `<Step xsi:type="Step_t"><StepId>${sid++}</StepId><Name>${name}</Name><Duration xsi:type="Time_t"><Seconds>${sec}</Seconds></Duration><Intensity>${intensity}</Intensity><Target xsi:type="HeartRateRangeTarget_t"><Low>${loHR}</Low><High>${hiHR}</High></Target></Step>`;
  const openStep = (name, sec, intensity='Active') =>
    `<Step xsi:type="Step_t"><StepId>${sid++}</StepId><Name>${name}</Name><Duration xsi:type="Time_t"><Seconds>${sec}</Seconds></Duration><Intensity>${intensity}</Intensity><Target xsi:type="Open_t"/></Step>`;
  const repeat = (reps, innerSteps) =>
    `<Step xsi:type="Repeat_t"><StepId>${sid++}</StepId><Repetitions>${reps}</Repetitions>${innerSteps}</Step>`;

  // ── Fartlek ──────────────────────────────────────
  if(tags.includes('Fartlek')) {
    return step('Warm-Up',600,120,140) +
      repeat(8,
        step('Schnell',120,158,175) +
        step('Easy Jog',120,120,140)
      ) + step('Cool-Down',600,110,135);
  }
  // ── Tempo / Intervalle ───────────────────────────
  if(tags.includes('Intervalle') || tags.includes('Tempo')) {
    const reps = tags.includes('Intervalle') ? 6 : 4;
    const workSec = tags.includes('Intervalle') ? 240 : 300;
    return step('Warm-Up',900,120,145) +
      repeat(reps,
        step('Tempo',workSec,162,178) +
        step('Recovery',120,120,140)
      ) + step('Cool-Down',600,110,135);
  }
  // ── Hill Intervalle ──────────────────────────────
  if(tags.includes('Hills')) {
    return step('Warm-Up',900,120,145) +
      repeat(8,
        step('Hill-Sprint',75,160,180) +
        openStep('Gehen zurück',90,'Resting')
      ) + step('Cool-Down',900,110,135);
  }
  // ── Downhill + PowerHike (Simulation/Race-Specific) ──
  if(tags.includes('Simulation') || (tags.includes('Downhill') && tags.includes('PowerHike'))) {
    const loopSec = Math.round(totalSec / 5); // ~5 loops
    const runSec  = Math.round(loopSec * 0.55);
    const hikeSec = Math.round(loopSec * 0.35);
    const restSec = Math.round(loopSec * 0.10);
    return step('Warm-Up',600,120,140) +
      repeat(5,
        step('Downhill Run', runSec,  138,165) +
        step('Power Hike',   hikeSec, 125,148) +
        openStep('Pause / Zelt', restSec, 'Resting')
      ) + step('Cool-Down',300,110,130);
  }
  // ── Easy + PowerHike Block ───────────────────────
  if(tags.includes('PowerHike') && tags.includes('Easy')) {
    // Extract power hike duration from description (look for "X Min Power Hike")
    const match = (w.description||'').match(/(\d+)\s*Min\s*Power\s*Hike/i);
    const hikeSec = match ? parseInt(match[1])*60 : 2400; // default 40min
    const runSec  = Math.max(600, totalSec - hikeSec - 600);
    const run1    = Math.round(runSec * 0.55);
    const run2    = Math.round(runSec * 0.45);
    return step('Easy Run Phase 1', run1,  120,145) +
           step('Power Hike',       hikeSec,118,142) +
           step('Easy Run Phase 2', run2,  120,145) +
           step('Cool-Down',        600,   110,135);
  }
  // ── Long Run ─────────────────────────────────────
  if(tags.includes('Long')) {
    const seg = Math.round(totalSec / 4);
    return step('Easy Start',    seg, 120,138) +
           step('Steady Phase 1',seg, 125,143) +
           step('Steady Phase 2',seg, 125,145) +
           step('Easy Finish',   seg, 118,138);
  }
  // ── Default Easy Run ─────────────────────────────
  return step('Easy Run', totalSec, 118,148);
}

function makeTCX(w, date) {
  const steps = buildTCXSteps(w);
  return `<?xml version="1.0" encoding="UTF-8"?>
<TrainingCenterDatabase xmlns="http://www.garmin.com/xmlschemas/TrainingCenterDatabase/v2" xmlns:xsi="http://www.w3.org/2001/XMLSchema-instance" xsi:schemaLocation="http://www.garmin.com/xmlschemas/TrainingCenterDatabase/v2 http://www.garmin.com/xmlschemas/TrainingCenterDatabasev2.xsd">
  <Workouts>
    <Workout Sport="Running">
      <Name>${w.title}</Name>
      ${steps}
      <ScheduledOn>${date||'2026-04-06'}</ScheduledOn>
    </Workout>
  </Workouts>
</TrainingCenterDatabase>`;
}

// Which workouts get a Garmin export button?
function isExportable(w) {
  const t = w.tags || [];
  return t.some(x=>['Intervalle','Fartlek','Tempo','Hills','Simulation','Race-Specific','PowerHike','Long','Downhill'].includes(x));
}

function dlTCX(w, date) {
  const blob = new Blob([makeTCX(w, date)], {type:'application/xml'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `${w.id}-${w.title.replace(/[\s/]+/g,'-')}.tcx`;
  a.click();
  URL.revokeObjectURL(a.href);
}

// Human-readable summary of what the TCX contains
function garminSummary(w) {
  const t = w.tags || [];
  if(t.includes('Fartlek')) return '8 × 2 Min schnell (Z3–Z4) / 2 Min Easy · 10 Min WU + CD';
  if(t.includes('Intervalle')) return '6 × 4 Min Tempo (Z3–Z4) / 2 Min Recovery · 15 Min WU + CD';
  if(t.includes('Tempo')) return '4 × 5 Min Tempo (Z3) / 3 Min Easy · 15 Min WU + CD';
  if(t.includes('Hills')) return '8 × 75s Bergauf-Sprint / Gehen zurück · 15 Min WU + CD';
  if(t.includes('Simulation')) return '5 Loops: Downhill Run + Power Hike + Pause · Race-Format';
  if(t.includes('PowerHike') && t.includes('Easy')) {
    const m = (w.description||'').match(/(\d+)\s*Min\s*Power\s*Hike/i);
    return `Easy Run → ${m?m[1]+'min ':''} Power Hike → Easy Run → Cool-Down`;
  }
  if(t.includes('Long')) return '4 gleichmässige Phasen · Z1–Z2 durch · HR-gesteuert';
  return 'HR-gesteuerte Easy-Einheit';
}

function DayCard({day, weekId, week, onOpen, dragState, onDragStart, onDragEnd, onDragOver, onDrop, onDragLeave, isOver, completed, edits, onMoveClick}) {
  const today = new Date();
  const d = new Date(day.date+'T12:00:00');
  const isToday = today.toDateString()===d.toDateString();
  const isPast = d<today && !isToday;
  const isRace = day.workouts.some(w=>w.type==='race');
  const dayKm = day.workouts.filter(w=>w.type==='run').reduce((s,w)=>{
    const k=edits[`km_${w.id}`]; return s+(k!==undefined?+k:(w.km||0));
  },0);

  return (
    <div
      className="drop-zone"
      onDragOver={e=>{e.preventDefault();onDragOver(day.date,weekId);}}
      onDrop={e=>{e.preventDefault();onDrop(day.date,weekId);}}
      onDragLeave={onDragLeave}
      style={{
        background: isRace ? 'linear-gradient(135deg,rgba(255,208,64,0.09),rgba(255,180,0,0.04))' :
                    isToday ? 'rgba(92,141,255,0.08)' : 'var(--surface-1)',
        border: `1px solid ${isRace ? 'rgba(255,208,64,0.45)' : isToday ? C.blueBorder : isOver ? C.blue : 'var(--border)'}`,
        borderRadius:14, padding:14,
        transition:'border-color 0.15s, background 0.15s',
        boxShadow: isToday ? `0 0 20px rgba(92,141,255,0.2)` : isRace ? `0 0 20px rgba(255,208,64,0.2)` : 'none',
      }}
    >
      <div style={{display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:10}}>
        <div style={{display:'flex', alignItems:'center', gap:8}}>
          <span style={{fontSize:13, fontWeight:700, color: isRace?C.gold : isToday?C.blue : 'rgba(246,246,244,0.85)'}}>{day.label}</span>
          {isToday && <span style={{fontSize:10, fontWeight:800, background:C.blue, color:'#080810', padding:'2px 7px', borderRadius:4, letterSpacing:'0.05em', boxShadow:`0 0 10px ${C.blue}`}}>HEUTE</span>}
        </div>
        {dayKm > 0 && <span style={{fontSize:12, color:'rgba(246,246,244,0.55)', fontWeight:600}}>{dayKm}km</span>}
      </div>
      <div style={{display:'flex', flexDirection:'column', gap:6}}>
        {day.workouts.map(w => (
          w.type==='race' ? (
            <div key={w.id} onClick={()=>onOpen(w,day,weekId)}
              style={{padding:'12px 14px', borderRadius:10, background:C.goldDim, border:`1px solid ${C.goldBorder}`, cursor:'pointer', textAlign:'center'}}>
              <div style={{fontWeight:900, fontSize:15, color:C.gold, letterSpacing:'-0.01em'}}>Λ · Ω</div>
              <div style={{fontWeight:700, fontSize:12, color:C.gold, marginTop:2}}>WITIKER BACKYARD ULTRA</div>
              <div style={{fontSize:11, color:'rgba(255,217,125,0.6)', marginTop:1}}>14. Mai · Start 12:00</div>
            </div>
          ) : (
            <WorkoutPill key={w.id} w={w} day={day} weekId={weekId}
              onOpen={onOpen}

        <div style={{fontSize:16, fontWeight:800, color:C.blush, marginBottom:4}}>Tägliche Abend-Routine · 15 Min</div>
        <p style={{fontSize:13, color:'rgba(246,246,244,0.5)', lineHeight:1.6}}>7× pro Woche – jeden Abend. Fokus gemäss Sportarzt: Hüfte ist leicht steif. Balance Board bei markierten Übungen einsetzen.</p>
      </div>
      <div style={{display:'flex', flexDirection:'column', gap:12}}>
        {MOBILITY_ROUTINE.map((ex,i)=>(
          <div key={ex.id} style={{background:'var(--surface-1)', borderRadius:14, padding:16, border:'1px solid var(--border)'}}>
            <div style={{display:'flex', gap:12, marginBottom:8}}>
              <div style={{width:32, height:32, borderRadius:8, background:'rgba(245,192,208,0.1)', border:'1px solid rgba(245,192,208,0.2)', display:'flex', alignItems:'center', justifyContent:'center', fontSize:18, flexShrink:0}}>{ex.icon}</div>
              <div style={{flex:1}}>
                <div style={{display:'flex', justifyContent:'space-between', alignItems:'flex-start', gap:8}}>
                  <div style={{fontSize:14, fontWeight:700, color:'var(--cloud)'}}>{ex.name}</div>
                  <a href={ex.url} target="_blank" rel="noopener noreferrer" style={{fontSize:11, color:'#ff6b6b', background:'rgba(255,107,107,0.08)', padding:'4px 8px', borderRadius:6, textDecoration:'none', flexShrink:0}}>▶</a>
                </div>
                <div style={{fontSize:12, color:C.blush, fontWeight:600, marginTop:2}}>{ex.dur}</div>
              </div>
            </div>
            <p style={{fontSize:13, color:'rgba(246,246,244,0.55)', lineHeight:1.6, marginBottom:8}}>{ex.desc}</p>
            <div style={{display:'flex', flexWrap:'wrap', gap:4}}>
              {ex.cues.map((c,j)=><span key={j} style={{fontSize:11, background:'rgba(245,192,208,0.08)', color:'rgba(245,192,208,0.65)', padding:'3px 8px', borderRadius:4, border:'1px solid rgba(245,192,208,0.12)'}}>{c}</span>)}
            </div>
          </div>
        ))}
      </div>
    </div>
  );
}

// Overview tab
function OverviewTab({plan, edits, setActiveWeek, setActiveTab}) {
  return (
    <div style={{display:'flex', flexDirection:'column', gap:16, paddingBottom:80}}>
      <div style={{background:'var(--surface-1)', borderRadius:14, padding:16, border:'1px solid var(--border)'}}>
        <div style={{fontSize:14, fontWeight:800, color:'var(--cloud)', marginBottom:16}}>Wochenübersicht</div>
        <div style={{display:'flex', flexDirection:'column', gap:12}}>
          {plan.map((w,i)=>{
            const km = weekKm(w, edits);
            const pct = Math.min(100,Math.round(km/w.targetKm*100));
            return (
              <div key={w.id} style={{cursor:'pointer'}} onClick={()=>{setActiveWeek(i);setActiveTab('plan');}}>
                <div style={{display:'flex', justifyContent:'space-between', marginBottom:6}}>
                  <span style={{fontSize:13, fontWeight:700, color:'var(--cloud)'}}>{w.label} <span style={{fontWeight:500, color:'rgba(246,246,244,0.55)'}}>– {w.name}</span></span>
                  <span style={{fontSize:13, fontWeight:700, color:'rgba(246,246,244,0.7)'}}>{w.targetKm} km</span>
                </div>
                <div style={{height:5, background:'rgba(246,246,244,0.07)', borderRadius:3, overflow:'hidden'}}>
                  <div style={{height:'100%', width:`${pct}%`, background:w.color, borderRadius:3, transition:'width 0.4s ease', boxShadow:`0 0 6px ${w.color}`}}/>
                </div>
              </div>
            );
          })}
        </div>
      </div>
      <div style={{background:'var(--surface-1)', borderRadius:14, padding:16, border:'1px solid var(--border)'}}>
        <div style={{fontSize:14, fontWeight:800, color:'var(--cloud)', marginBottom:14}}>Krafttraining – Übersicht</div>
        <div style={{display:'flex', flexDirection:'column', gap:10}}>
          {Object.entries(ST).map(([key,r])=>(
            <div key={key} style={{borderRadius:12, padding:14, background:'var(--surface-2)', border:'1px solid var(--border)'}}>
              <div style={{display:'flex', alignItems:'center', gap:8, marginBottom:4}}>
                <span style={{fontSize:11, fontWeight:800, background:r.color, color:'#FFFFFF', padding:'2px 8px', borderRadius:4, border:'1px solid rgba(255,255,255,0.2)'}}>{key}</span>
                <span style={{fontSize:14, fontWeight:700, color:r.color}}>{r.name}</span>
              </div>
              <p style={{fontSize:12, color:'rgba(246,246,244,0.55)', marginBottom:10}}>{r.focus}</p>
              {r.exIds.map(id=>{const e=EX[id];return e?(<div key={id} style={{display:'flex',alignItems:'center',gap:8,padding:'6px 0',borderBottom:'1px solid var(--border)'}}>
                <span style={{fontSize:16}}>{e.i}</span><span style={{fontSize:13,color:'rgba(246,246,244,0.78)',flex:1}}>{e.n}</span><span style={{fontSize:11,color:'rgba(246,246,244,0.45)',fontWeight:600}}>{e.s}</span></div>):null})}
            </div>
          ))}
        </div>
      </div>
      <div style={{background:'rgba(255,217,125,0.05)', borderRadius:14, padding:16, border:'1px solid rgba(255,217,125,0.12)'}}>
        <div style={{fontSize:14, fontWeight:800, color:C.gold, marginBottom:10}}>⌚ Garmin FR965 – Workflow</div>
        <p style={{fontSize:13, color:'rgba(255,217,125,0.6)', lineHeight:1.6, marginBottom:10}}>Für strukturierte Einheiten (Intervalle, Tempo, Hills) TCX-Datei direkt aus der Einheiten-Detailansicht exportieren.</p>
        <div style={{fontFamily:'monospace', fontSize:12, color:'rgba(255,217,125,0.5)', background:'rgba(0,0,0,0.3)', borderRadius:8, padding:12, lineHeight:1.8}}>
          1. Workout öffnen → "TCX herunterladen"<br/>
          2. Garmin Connect App → Mehr → Workouts → Import<br/>
          3. Datei auswählen → Importieren<br/>
          4. Nächster Sync → Einheit auf FR965
        </div>
      </div>
    </div>
  );
}

// ── MAIN APP ──────────────────────────────────────
function App() {
  const [plan, setPlan] = useState(() => deepCopy(INITIAL_WEEKS));
  const [activeWeek, setActiveWeek] = useState(0);
  const [activeTab, setActiveTab] = useState('plan');
  const [modal, setModal] = useState(null);   // {type, workout, day, weekId}
  const [moveModal, setMoveModal] = useState(null); // {workout, sourceDayDate, sourceWeekId}
  const [completed, setCompleted] = useState(() => {
    try { return new Set(JSON.parse(localStorage.getItem('aneo_done')||'[]')); } catch { return new Set(); }
  });
  const [edits, setEdits] = useState(() => {
    try { return JSON.parse(localStorage.getItem('aneo_edits')||'{}'); } catch { return {}; }
  });
  const [dragState, setDragState] = useState(null); // {workoutId, sourceDayDate, sourceWeekId}
  const [dropTarget, setDropTarget] = useState(null); // dayDate

  useEffect(()=>{ try{localStorage.setItem('aneo_done',JSON.stringify([...completed]));}catch{} },[completed]);
  useEffect(()=>{ try{localStorage.setItem('aneo_edits',JSON.stringify(edits));}catch{} },[edits]);

  const cd = countdown();
  const week = plan[activeWeek];
  const totalWo = useMemo(()=>{ let t=0,d=0; plan.forEach(w=>w.days.forEach(dy=>dy.workouts.forEach(wo=>{t++;if(completed.has(wo.id))d++;}))); return{t,d}; },[plan,completed]);

  // DnD handlers
  const handleDragStart = useCallback((wo, day, weekId) => {
    setDragState({workoutId:wo.id, sourceDayDate:day.date, sourceWeekId:weekId});
  },[]);
  const handleDragEnd = useCallback(()=>{ setDragState(null); setDropTarget(null); },[]);
  const handleDragOver = useCallback((dayDate, wId)=>{ setDropTarget(dayDate); },[]);
  const handleDragLeave = useCallback(()=>{ setDropTarget(null); },[]);
  const handleDrop = useCallback((targetDate, targetWeekId)=>{
    if(!dragState) return;
    const {workoutId,sourceDayDate,sourceWeekId} = dragState;
    if(sourceDayDate===targetDate) { setDragState(null); setDropTarget(null); return; }
    setPlan(prev=>{
      const next = deepCopy(prev);
      const srcWeek = next.find(w=>w.id===sourceWeekId);
      const srcDay  = srcWeek?.days.find(d=>d.date===sourceDayDate);
      const idx     = srcDay?.workouts.findIndex(w=>w.id===workoutId);
      if(idx===undefined||idx===-1) return prev;
      const [moved] = srcDay.workouts.splice(idx,1);
      const tgtWeek = next.find(w=>w.id===targetWeekId);
      const tgtDay  = tgtWeek?.days.find(d=>d.date===targetDate);
      if(!tgtDay) return prev;
      tgtDay.workouts.push(moved);
      return next;
    });
    setDragState(null); setDropTarget(null);
  },[dragState]);

  // Move (mobile)
  const handleMove = useCallback((targetDate, targetWeekId)=>{
    if(!moveModal) return;
    const {workout, sourceDayDate, sourceWeekId} = moveModal;
    if(sourceDayDate===targetDate) { setMoveModal(null); return; }
    setPlan(prev=>{
      const next = deepCopy(prev);
      const srcWeek = next.find(w=>w.id===sourceWeekId);
      const srcDay  = srcWeek?.days.find(d=>d.date===sourceDayDate);
      const idx     = srcDay?.workouts.findIndex(w=>w.id===workout.id);
      if(idx===undefined||idx===-1) return prev;
      const [moved] = srcDay.workouts.splice(idx,1);
      const tgtWeek = next.find(w=>w.id===targetWeekId);
      const tgtDay  = tgtWeek?.days.find(d=>d.date===targetDate);
      if(!tgtDay) return prev;
      tgtDay.workouts.push(moved);
      return next;
    });
    setMoveModal(null); setModal(null);
  },[moveModal]);

  const openWorkout = useCallback((w, day, weekId)=>{ setModal({workout:w,day,weekId}); },[]);
  const toggleDone = useCallback(id=>{ setCompleted(p=>{const n=new Set(p);n.has(id)?n.delete(id):n.add(id);return n;}); },[]);
  const handleEdit = useCallback((k,v)=>{ setEdits(p=>({...p,[k]:v})); },[]);

  const renderModal = () => {
    if(!modal) return null;
    const {workout:w, day, weekId} = modal;
    const done = completed.has(w.id);
    const base = {workout:w,day,onClose:()=>setModal(null),onToggleComplete:toggleDone,isCompleted:done};
    if(w.type==='run') return <RunModal {...base} onEdit={handleEdit} edits={edits} onMoveOpen={()=>setMoveModal({workout:w,sourceDayDate:day.date,sourceWeekId:weekId})}/>;
    if(w.type==='strength') return <StrengthModal {...base}/>;
    if(w.type==='mobility') return <MobilityModal {...base}/>;
    if(w.type==='race') return <RaceModal onClose={()=>setModal(null)}/>;
    return null;
  };

  return (
    <div style={{background:'var(--charcoal)', minHeight:'100vh'}}>
      {/* HEADER */}
      <div style={{position:'sticky', top:0, zIndex:30, background:'rgba(22,22,22,0.96)', backdropFilter:'blur(12px)', borderBottom:'1px solid var(--border)'}}>
        <div style={{maxWidth:900, margin:'0 auto', padding:'12px 16px', display:'flex', alignItems:'center', justifyContent:'space-between'}}>
          <Logo/>
          <div style={{textAlign:'right'}}>
            {cd ? (
              <div style={{display:'flex', alignItems:'center', gap:8}}>
                <div style={{textAlign:'center'}}>
                  <div style={{fontSize:22, fontWeight:900, color:'var(--cloud)', lineHeight:1}}>{cd.days}</div>
                  <div style={{fontSize:9, color:'rgba(246,246,244,0.3)', fontWeight:600, letterSpacing:'0.06em'}}>TAGE</div>
                </div>
                <div style={{color:'rgba(246,246,244,0.2)', fontWeight:300}}>:</div>
                <div style={{textAlign:'center'}}>
                  <div style={{fontSize:22, fontWeight:900, color:'var(--cloud)', lineHeight:1}}>{cd.hours}</div>
                  <div style={{fontSize:9, color:'rgba(246,246,244,0.3)', fontWeight:600, letterSpacing:'0.06em'}}>STD</div>
                </div>
              </div>
            ) : <span style={{color:C.gold, fontWeight:700}}>RACE DAY Λ Ω</span>}
            <div style={{fontSize:9, color:'rgba(246,246,244,0.2)', marginTop:2}}>{totalWo.d}/{totalWo.t} ✓</div>
          </div>
        </div>
        {/* Progress bar */}
        <div style={{height:2, background:'rgba(246,246,244,0.05)'}}>
          <div style={{height:'100%', width:`${Math.round(totalWo.d/totalWo.t*100)}%`, background:`linear-gradient(90deg,${C.blue},${C.sage})`, transition:'width 0.5s ease'}}/>
        </div>
        {/* Desktop tabs */}
        <div className="desktop-only" style={{maxWidth:900, margin:'0 auto', padding:'8px 16px', display:'flex', gap:6}}>
          {[['plan','📅 Plan'],['mobility','◎ Mobility'],['overview','◻ Übersicht']].map(([t,l])=>(
            <button key={t} onClick={()=>setActiveTab(t)} style={{padding:'6px 16px', borderRadius:8, fontSize:13, fontWeight:600, cursor:'pointer', border:'none', background:activeTab===t?'rgba(246,246,244,0.08)':'transparent', color:activeTab===t?'var(--cloud)':'rgba(246,246,244,0.35)', transition:'all 0.15s'}}>{l}</button>
          ))}
        </div>
      </div>

      {/* MAIN CONTENT */}
      <div style={{maxWidth:900, margin:'0 auto', padding:'20px 16px', paddingBottom:100}}>

        {activeTab === 'plan' && (
          <>
            {/* Week selector */}
            <div style={{display:'flex', gap:6, overflowX:'auto', paddingBottom:8, marginBottom:16, scrollbarWidth:'none', msOverflowStyle:'none'}}>
              {plan.map((w,i)=>(
                <button key={w.id} onClick={()=>setActiveWeek(i)}
                  className={`week-tab ${activeWeek===i?'active':''}`}
                  style={activeWeek===i ? {background:'var(--cloud)',color:'var(--charcoal)'} : {}}
                >
                  <span style={{fontWeight:700}}>{w.label}</span>
                  <span style={{opacity:0.5, fontWeight:400, marginLeft:4, fontSize:11}}>{w.targetKm}km</span>
                </button>
              ))}
            </div>

            {/* Week summary */}
            <div style={{background:'var(--surface-1)', borderRadius:16, padding:16, marginBottom:20, border:'1px solid var(--border)'}}>
              <div style={{display:'flex', justifyContent:'space-between', alignItems:'flex-start', marginBottom:12}}>
                <div>
                  <div style={{fontSize:20, fontWeight:900, color:'var(--cloud)', letterSpacing:'-0.02em'}}>{week.label} – {week.name}</div>
                  <div style={{fontSize:12, color:week.color, fontWeight:600, marginTop:3}}>{week.name.replace(/\s*[\d~]+km/i,'').trim()} · {week.dateRange}</div>
                </div>
                <div style={{textAlign:'right'}}>
                  <div style={{fontSize:28, fontWeight:900, color:'var(--cloud)', letterSpacing:'-0.02em', lineHeight:1}}>
                    {Math.round(weekKmDone(week, edits, completed))}
                    <span style={{fontSize:14, color:'rgba(246,246,244,0.3)', fontWeight:400, marginLeft:4}}>/ {week.targetKm} km</span>
                  </div>
                </div>
              </div>
              <div style={{height:4, background:'rgba(246,246,244,0.07)', borderRadius:2, overflow:'hidden', marginBottom:14}}>
                <div style={{height:'100%', width:`${Math.min(100,Math.round(weekKmDone(week,edits,completed)/week.targetKm*100))}%`, background:week.color, borderRadius:2, transition:'width 0.5s ease', boxShadow:`0 0 8px ${week.color}`}}/>
              </div>
              <div style={{display:'grid', gridTemplateColumns:'repeat(3,1fr)', gap:8}}>
                {[
                  {label:'Lauftage', val:week.days.filter(d=>d.workouts.some(w=>w.type==='run')).length, color:C.blue, glow:'glow-blue', border:C.blueBorder},
                  {label:'Kraft', val:`${week.days.filter(d=>d.workouts.some(w=>w.type==='strength')).length}×`, color:C.sage, glow:'glow-sage', border:C.sageBorder},
                  {label:'Speed/Hügel', val:`${week.days.filter(d=>d.workouts.some(w=>w.type==='run'&&w.tags?.some(t=>['Speed','Intervalle','Fartlek','Tempo','Hills'].includes(t)))).length}×`, color:C.blush, glow:'glow-blush', border:C.blushBorder},
                ].map(s=>(
                  <div key={s.label} className={s.glow} style={{background:'var(--surface-2)', borderRadius:10, padding:'10px 8px', textAlign:'center', border:`1px solid ${s.border}`}}>
                    <div style={{fontSize:22, fontWeight:900, color:s.color, letterSpacing:'-0.02em'}}>{s.val}</div>
                    <div style={{fontSize:10, color:'rgba(246,246,244,0.55)', fontWeight:700, letterSpacing:'0.05em', marginTop:3, textTransform:'uppercase'}}>{s.label}</div>
                  </div>
                ))}
              </div>
            </div>

            {/* Day cards grid */}
            <div style={{display:'grid', gridTemplateColumns:'repeat(auto-fill,minmax(280px,1fr))', gap:12}}>
              {week.days.map(day=>(
                <DayCard key={day.date} day={day} weekId={week.id} week={week}
                  onOpen={openWorkout}
                  dragState={dragState}
                  onDragStart={handleDragStart}
                  onDragEnd={handleDragEnd}
                  onDragOver={handleDragOver}
                  onDrop={handleDrop}
                  onDragLeave={handleDragLeave}
                  isOver={dropTarget===day.date}
                  completed={completed}
                  edits={edits}
                  onMoveClick={(wo,dy,wkId)=>setMoveModal({workout:wo,sourceDayDate:dy.date,sourceWeekId:wkId})}
                />
              ))}
            </div>
            {/* Desktop drag hint */}
            <div className="desktop-only" style={{textAlign:'center', marginTop:16, fontSize:12, color:'rgba(246,246,244,0.18)', letterSpacing:'0.04em'}}>
              ⠿ Einheiten per Drag & Drop zwischen Tagen verschieben
            </div>
          </>
        )}

        {activeTab === 'mobility' && <MobilityTab/>}
        {activeTab === 'overview' && <OverviewTab plan={plan} edits={edits} setActiveWeek={setActiveWeek} setActiveTab={setActiveTab}/>}
      </div>

      {/* BOTTOM NAV (mobile) */}
      <nav className="bottom-nav mobile-only">
        {[['plan','📅','Plan'],['mobility','◎','Mobility'],['overview','◻','Übersicht']].map(([t,ic,l])=>(
          <button key={t} className="bottom-nav-item" style={{background:'none', border:'none', cursor:'pointer', '-webkit-tap-highlight-color':'transparent'}} onClick={()=>setActiveTab(t)}>
            <span style={{fontSize:22, opacity:activeTab===t?1:0.35}}>{ic}</span>
            <span className="bottom-nav-label" style={{color:activeTab===t?C.blue:'rgba(246,246,244,0.35)'}}>{l}</span>
          </button>
        ))}
      </nav>

      {/* Modals */}
      {renderModal()}
      {moveModal && (
        <MoveModal data={moveModal} plan={plan} onMove={handleMove} onClose={()=>setMoveModal(null)}/>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
