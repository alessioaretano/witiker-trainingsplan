<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0, user-scalable=no"/>
  <title>ANEO Training</title>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
  <meta name="apple-mobile-web-app-title" content="ANEO Training"/>
  <meta name="theme-color" content="#000000"/>
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png">
  <link rel="icon" type="image/png" sizes="192x192" href="icon-192.png">
  
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet"/>
  
  <style>
    :root {
      --bg: #000000;
      --surface: #0D0D0D;
      --card: #141414;
      --card2: #1C1C1C;
      --border: #1E1E1E;
      --border2: #2A2A2A;
      --text: #F0E6D8;
      --dim: #52493E;
      --mid: #8A7E70;
      --cream: #F0E6D8;
      --blue: #3377FF;
      --sage: #00E699;
      --blush: #FF1A75;
      --gold: #FFC000;
      --top: 52px;
      --bot: 64px;
    }
    
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; background: var(--bg); color: var(--text); font-family: 'Inter', -apple-system, BlinkMacSystemFont, system-ui, sans-serif; -webkit-font-smoothing: antialiased; overflow: hidden; }
    
    /* App-like Layout */
    .app-container { position: fixed; inset: 0; display: flex; flex-direction: column; padding-top: env(safe-area-inset-top); padding-bottom: env(safe-area-inset-bottom); }
    .top-bar { height: var(--top); background: var(--surface); border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; padding: 0 16px; z-index: 100; }
    .content { flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch; padding-bottom: var(--bot); }
    .bottom-nav { position: fixed; bottom: 0; left: 0; right: 0; height: calc(var(--bot) + env(safe-area-inset-bottom)); background: var(--surface); border-top: 1px solid var(--border); display: flex; padding-bottom: env(safe-area-inset-bottom); z-index: 100; }
    
    .nav-btn { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 2px; background: none; border: none; color: var(--dim); cursor: pointer; transition: color .15s; }
    .nav-btn.active { color: var(--cream); }
    .nav-icon { font-size: 20px; }
    .nav-label { font-size: 9px; font-weight: 700; text-transform: uppercase; letter-spacing: .05em; }

    /* Cards & UI Elements */
    .card { background: var(--card); border: 1px solid var(--border2); border-radius: 16px; padding: 16px; margin: 12px 16px; }
    .tag { display: inline-flex; align-items: center; padding: 2px 8px; border-radius: 9999px; font-size: 11px; font-weight: 600; letter-spacing: 0.04em; }
    
    /* Custom Scrollbar */
    ::-webkit-scrollbar { width: 4px; height: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: rgba(240,230,216,0.1); border-radius: 2px; }

    /* Modals */
    .modal-bg { position: fixed; inset: 0; background: rgba(0,0,0,0.9); backdrop-filter: blur(8px); z-index: 1000; display: flex; align-items: flex-end; justify-content: center; }
    .modal-sheet { background: var(--surface); border: 1px solid var(--border2); border-radius: 24px 24px 0 0; width: 100%; max-height: 90vh; overflow-y: auto; padding-bottom: env(safe-area-inset-bottom); }
    
    .aneo-logo { font-family: Georgia, serif; font-size: 18px; font-weight: 700; color: var(--cream); }
    .aneo-logo span { color: var(--blue); }
  </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useMemo } = React;

// --- CONFIG & DATA ---
const C = {
  blue: '#3377FF', sage: '#00E699', blush: '#FF1A75', gold: '#FFC000', cream: '#F0E6D8'
};

const INITIAL_PLAN = [
  { id: 'w1', label: 'Woche 1', name: 'Base Building', days: [
    { date: '2026-04-13', label: 'Mo', workouts: [{ id: 'r1', type: 'run', title: 'Easy Run', km: 8, duration: 45, hr: 'Z2', description: 'Lockerer Dauerlauf im Wohlfühltempo.' }] },
    { date: '2026-04-14', label: 'Di', workouts: [{ id: 's1', type: 'strength', routineKey: 'A' }] },
    { date: '2026-04-15', label: 'Mi', workouts: [{ id: 'r2', type: 'run', title: 'Intervalle', km: 10, duration: 55, hr: 'Z4', description: '4 x 1km @ 4:15 min/km, 2min Trabpause.' }] },
    { date: '2026-04-16', label: 'Do', workouts: [] },
    { date: '2026-04-17', label: 'Fr', workouts: [{ id: 'r3', type: 'run', title: 'Easy Run', km: 6, duration: 35, hr: 'Z2', description: 'Kurzer Erholungslauf.' }] },
    { date: '2026-04-18', label: 'Sa', workouts: [{ id: 'r4', type: 'run', title: 'Long Run', km: 18, duration: 100, hr: 'Z2', description: 'Langer Lauf, Fokus auf Fettstoffwechsel.' }] },
    { date: '2026-04-19', label: 'So', workouts: [] }
  ]}
];

const ST = {
  'A': { name: 'Kraft A', color: C.sage, focus: 'Core & Stability', dur: '30 min' },
  'B': { name: 'Kraft B', color: C.blue, focus: 'Leg Power', dur: '40 min' }
};

// --- COMPONENTS ---
function App() {
  const [activeTab, setActiveTab] = useState('plan');
  const [plan, setPlan] = useState(INITIAL_PLAN);
  const [selectedWorkout, setSelectedWorkout] = useState(null);

  return (
    <div className="app-container">
      <header className="top-bar">
        <div className="aneo-logo">ANEO<span>.</span></div>
        <div style={{textAlign:'right'}}>
          <div style={{fontSize:16, fontWeight:700, color:C.cream}}>Witiker Plan</div>
          <div style={{fontSize:10, color:'var(--dim)', textTransform:'uppercase'}}>Training Journey</div>
        </div>
      </header>

      <main className="content">
        {activeTab === 'plan' && (
          <div style={{paddingTop:8}}>
            {plan.map(week => (
              <div key={week.id}>
                <div style={{padding:'16px 16px 4px', fontSize:11, fontWeight:700, color:'var(--dim)', textTransform:'uppercase', letterSpacing:'.1em'}}>
                  {week.label} · {week.name}
                </div>
                {week.days.map(day => (
                  <div key={day.date} className="card" style={{margin:'8px 16px', display:'flex', alignItems:'center', gap:16}}>
                    <div style={{width:32, textAlign:'center'}}>
                      <div style={{fontSize:10, color:'var(--dim)', textTransform:'uppercase'}}>{day.label}</div>
                      <div style={{fontSize:16, fontWeight:800}}>{day.date.split('-')[2]}</div>
                    </div>
                    <div style={{flex:1, display:'flex', flexDirection:'column', gap:6}}>
                      {day.workouts.length === 0 ? (
                        <div style={{fontSize:13, color:'var(--dim)', fontStyle:'italic'}}>Rest Day</div>
                      ) : (
                        day.workouts.map(w => (
                          <div key={w.id} onClick={() => setSelectedWorkout({w, day})} style={{cursor:'pointer'}}>
                            <div style={{display:'flex', justifyContent:'space-between', alignItems:'center'}}>
                              <span style={{fontSize:14, fontWeight:700}}>{w.title || (w.type === 'strength' ? ST[w.routineKey].name : 'Lauf')}</span>
                              {w.km && <span style={{fontSize:12, color:C.blue, fontWeight:700}}>{w.km}km</span>}
                            </div>
                            <div style={{fontSize:11, color:'var(--mid)'}}>
                              {w.type === 'run' ? `${w.duration}min · ${w.hr}` : `${ST[w.routineKey].focus}`}
                            </div>
                          </div>
                        ))
                      )}
                    </div>
                  </div>
                ))}
              </div>
            ))}
          </div>
        )}
        {activeTab === 'stats' && <div style={{padding:40, textAlign:'center', color:'var(--dim)'}}>Statistiken kommen bald...</div>}
      </main>

      <nav className="bottom-nav">
        <button className={`nav-btn ${activeTab === 'plan' ? 'active' : ''}`} onClick={() => setActiveTab('plan')}>
          <span className="nav-icon">📅</span>
          <span className="nav-label">Plan</span>
        </button>
        <button className={`nav-btn ${activeTab === 'stats' ? 'active' : ''}`} onClick={() => setActiveTab('stats')}>
          <span className="nav-icon">📊</span>
          <span className="nav-label">Stats</span>
        </button>
        <button className="nav-btn">
          <span className="nav-icon">👤</span>
          <span className="nav-label">Profil</span>
        </button>
      </nav>

      {selectedWorkout && (
        <div className="modal-bg" onClick={() => setSelectedWorkout(null)}>
          <div className="modal-sheet" onClick={e => e.stopPropagation()}>
            <div style={{width:36, height:4, background:'var(--border2)', borderRadius:2, margin:'12px auto 20px'}} />
            <div style={{padding:'0 20px 32px'}}>
              <h2 style={{fontSize:20, fontWeight:800, marginBottom:4}}>{selectedWorkout.w.title || (selectedWorkout.w.type === 'strength' ? ST[selectedWorkout.w.routineKey].name : 'Workout')}</h2>
              <p style={{fontSize:13, color:'var(--mid)', marginBottom:20}}>{selectedWorkout.day.label}, {selectedWorkout.day.date}</p>
              
              <div style={{background:'var(--card)', borderRadius:12, padding:16, border:'1px solid var(--border2)', marginBottom:16}}>
                <div style={{fontSize:11, fontWeight:700, color:'var(--dim)', textTransform:'uppercase', marginBottom:8}}>Details</div>
                <p style={{fontSize:15, lineHeight:1.6, color:'var(--text)'}}>{selectedWorkout.w.description || 'Keine Beschreibung verfügbar.'}</p>
              </div>
              
              <button onClick={() => setSelectedWorkout(null)} style={{width:'100%', padding:16, borderRadius:12, background:C.blue, color:'#fff', fontWeight:700, border:'none'}}>Schliessen</button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
</script>
</body>
</html>
