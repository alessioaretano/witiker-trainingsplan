  <style>
    :root {
      --bg: #000000;
      --surface-1: #0D0D0D;
      --surface-2: #141414;
      --surface-3: #1C1C1C;
      --border: #1E1E1E;
      --border-accent: #2A2A2A;
      --text: #F0E6D8;
      --dim: #52493E;
      --mid: #8A7E70;
      --cream: #F0E6D8;
      --blue: #3377FF;
      --sage: #00E699;
      --blush: #FF1A75;
      --gold: #FFC000;
      --cloud: #F0E6D8;
    }
    
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; background: var(--bg); }
    body { 
      background: var(--bg); 
      color: var(--text); 
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, system-ui, sans-serif; 
      min-height: 100vh; 
      -webkit-font-smoothing: antialiased; 
      padding-bottom: env(safe-area-inset-bottom);
    }
    
    /* Custom Scrollbar */
    ::-webkit-scrollbar { width: 4px; height: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: rgba(240,230,216,0.1); border-radius: 2px; }

    .tag { display: inline-flex; align-items: center; padding: 2px 8px; border-radius: 9999px; font-size: 11px; font-weight: 600; letter-spacing: 0.04em; white-space: nowrap; }
    
    .modal-bg { position: fixed; inset: 0; background: rgba(0,0,0,0.9); backdrop-filter: blur(8px); z-index: 1000; display: flex; align-items: flex-end; justify-content: center; padding: 0; }
    @media (min-width: 640px) { .modal-bg { align-items: center; padding: 16px; } }
    .modal-sheet { background: var(--surface-1); border: 1px solid var(--border); border-radius: 24px 24px 0 0; width: 100%; max-height: 92vh; overflow-y: auto; }
    @media (min-width: 640px) { .modal-sheet { max-width: 640px; border-radius: 24px; } }
    
    .pill { display: flex; align-items: center; gap: 8px; padding: 10px 12px; border-radius: 12px; cursor: pointer; transition: opacity 0.15s; user-select: none; -webkit-user-select: none; background: var(--surface-2); border: 1px solid var(--border); }
    .pill:active { opacity: 0.7; }
    
    .week-tab { padding: 8px 16px; border-radius: 100px; font-size: 13px; font-weight: 600; white-space: nowrap; cursor: pointer; transition: all 0.15s; border: 1px solid transparent; }
    .week-tab.active { background: var(--cream); color: #000; }
    .week-tab:not(.active) { color: var(--mid); border-color: transparent; }
    .week-tab:not(.active):hover { color: var(--cream); background: var(--surface-2); }
    
    .bottom-nav { position: fixed; bottom: 0; left: 0; right: 0; background: var(--surface-1); border-top: 1px solid var(--border); z-index: 40; padding: 8px 0 max(8px, env(safe-area-inset-bottom)); display: flex; }
    .bottom-nav-item { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 3px; padding: 4px 8px; cursor: pointer; -webkit-tap-highlight-color: transparent; color: var(--dim); }
    .bottom-nav-item.active { color: var(--cream); }
    .bottom-nav-label { font-size: 10px; font-weight: 700; letter-spacing: 0.05em; text-transform: uppercase; }
    
    .exercise-row { border-bottom: 1px solid var(--border); }
    .exercise-row:last-child { border-bottom: none; }
    
    .aneo-logo { font-family: Georgia, serif; font-size: 18px; font-weight: 700; color: var(--cream); letter-spacing: -0.02em; }
    .aneo-logo span { color: var(--blue); }
    
    @media (max-width: 639px) { .desktop-only { display: none !important; } }
    @media (min-width: 640px) { .mobile-only { display: none !important; } .bottom-nav { display: none !important; } }
    
    /* Custom styles for the Witiker Plan content */
    .card { background: var(--surface-2); border: 1px solid var(--border); border-radius: 16px; padding: 16px; margin-bottom: 12px; }
    .section-title { font-size: 11px; font-weight: 700; color: var(--dim); text-transform: uppercase; letter-spacing: .1em; margin-bottom: 8px; }
  </style>
</head>

    { date:'2026-05-16', label:'Sa', workouts:[] },
    { date:'2026-05-17', label:'So', workouts:[] },
  ]}
];

// ── COMPONENTS ────────────────────────────────────

function Tag({t}) {
  const colors = {
    'Z2': { bg:C.blueDim, text:C.blue, border:C.blueBorder },
    'Z3': { bg:C.goldDim, text:C.gold, border:C.goldBorder },
    'Z4': { bg:C.blushDim, text:C.blush, border:C.blushBorder },
    'RACE': { bg:C.blush, text:'#fff', border:C.blush },
    'Strength': { bg:C.sageDim, text:C.sage, border:C.sageBorder },
  };
  const s = colors[t] || { bg:'rgba(240,230,216,0.05)', text:C.mid, border:'rgba(240,230,216,0.1)' };
  return <span className="tag" style={{ background:s.bg, color:s.text, border:`1px solid ${s.border}` }}>{t}</span>;
}

function ExCard({exId}) {
  const ex = EX[exId];
  const [open, setOpen] = useState(false);
  if(!ex) return null;
  const catColor = {A:C.sage,B:C.blue,C:C.blush}[ex.cat]||C.blue;
  return (
    <div className="exercise-row" style={{padding:'12px 0'}}>
      <button style={{display:'flex', alignItems:'center', gap:12, width:'100%', background:'none', border:'none', cursor:'pointer', color:'inherit', textAlign:'left'}} onClick={()=>setOpen(!open)}>
        <span style={{fontSize:20, flexShrink:0}}>{ex.i}</span>
        <div style={{flex:1}}>
          <div style={{fontSize:14, fontWeight:700, color:C.cloud}}>{ex.n}</div>
          <div style={{fontSize:12, color:var(--dim), marginTop:2}}>{ex.m} · <span style={{color:catColor, fontWeight:600}}>{ex.s}</span></div>
        </div>
        <span style={{color:var(--dim), fontSize:12, flexShrink:0}}>{open?'▲':'▼'}</span>
      </button>
      {open && (
        <div style={{marginTop:12, paddingLeft:32, display:'flex', flexDirection:'column', gap:10}}>
          <p style={{fontSize:13, color:var(--mid), lineHeight:1.6}}>{ex.d}</p>
          {ex.cues && <div style={{display:'flex', flexDirection:'column', gap:4}}>
            {ex.cues.map((c,i)=><div key={i} style={{fontSize:12, color:var(--dim), display:'flex', gap:8}}><span style={{color:catColor,flexShrink:0}}>→</span>{c}</div>)}
          </div>}
          <a href={ex.url} target="_blank" rel="noopener noreferrer"
            style={{display:'inline-flex', alignItems:'center', gap:6, fontSize:12, color:C.blush, background:C.blushDim, padding:'6px 12px', borderRadius:8, textDecoration:'none', width:'fit-content', border:`1px solid ${C.blushBorder}`}}>
            ▶ YouTube Demo
          </a>
        </div>
      )}
    </div>
  );
}

function RunModal({workout, day, onClose}) {
  return (
    <div className="modal-bg" onClick={onClose}>
      <div className="modal-sheet" onClick={e=>e.stopPropagation()}>
        <div style={{width:36, height:4, background:'var(--border-accent)', borderRadius:2, margin:'12px auto 20px'}} />
        <div style={{padding:'0 20px 32px'}}>
          <div style={{display:'flex', justifyContent:'space-between', alignItems:'flex-start', marginBottom:8}}>
            <div>
              <h2 style={{fontSize:20, fontWeight:800, color:C.cloud}}>{workout.title}</h2>
              <p style={{fontSize:13, color:var(--dim)}}>{day?.label}, {day?.date}</p>
            </div>
            <button onClick={onClose} style={{background:'var(--surface-2)', border:'none', color:var(--mid), width:32, height:32, borderRadius:50, cursor:'pointer', fontSize:18}}>×</button>
          </div>
          <div style={{display:'flex', flexWrap:'wrap', gap:6, marginBottom:20}}>
            {workout.tags?.map(t=><Tag key={t} t={t}/>)}
          </div>
          <div style={{display:'grid', gridTemplateColumns:'repeat(3,1fr)', gap:10, marginBottom:20}}>
            {[
              { label:'Distanz', val:workout.km, unit:'km', color:C.blue },
              { label:'Dauer', val:workout.duration, unit:'min', color:C.sage },
              { label:'Intensität', val:workout.hr, unit:'', color:C.blush }
            ].map(m => (
              <div key={m.label} style={{background:'var(--surface-2)', borderRadius:12, padding:'12px 8px', textAlign:'center', border:'1px solid var(--border)'}}>
                <div style={{fontSize:10, color:var(--dim), fontWeight:700, textTransform:'uppercase', marginBottom:4}}>{m.label}</div>
                <div style={{fontSize:18, fontWeight:800, color:m.color}}>{m.val}<span style={{fontSize:11, marginLeft:2, opacity:0.6}}>{m.unit}</span></div>
              </div>
            ))}
          </div>
          <div className="card">
            <div className="section-title">Beschreibung</div>
            <p style={{fontSize:15, color:var(--text), lineHeight:1.6}}>{workout.description}</p>
          </div>
          <button onClick={onClose} style={{width:'100%', padding:16, borderRadius:12, background:C.blue, color:'#fff', fontWeight:700, border:'none', marginTop:12}}>Fertig</button>
        </div>
      </div>
    </div>
  );
}

function StrengthModal({workout, day, onClose}) {
  const r = ST[workout.routineKey];
  if(!r) return null;
  return (
    <div className="modal-bg" onClick={onClose}>
      <div className="modal-sheet" onClick={e=>e.stopPropagation()}>
        <div style={{width:36, height:4, background:'var(--border-accent)', borderRadius:2, margin:'12px auto 20px'}} />
        <div style={{padding:'0 20px 32px'}}>
          <div style={{display:'flex', justifyContent:'space-between', alignItems:'flex-start', marginBottom:16}}>
            <div>
              <div style={{display:'flex', alignItems:'center', gap:8, marginBottom:4}}>
                <span style={{fontSize:11, fontWeight:800, background:r.color, color:'#000', padding:'2px 6px', borderRadius:4}}>{workout.routineKey}</span>
                <h2 style={{fontSize:20, fontWeight:800, color:r.color}}>{r.name}</h2>
              </div>
              <p style={{fontSize:13, color:var(--dim)}}>{r.focus} · {r.dur}</p>
            </div>
            <button onClick={onClose} style={{background:'var(--surface-2)', border:'none', color:var(--mid), width:32, height:32, borderRadius:50, cursor:'pointer', fontSize:18}}>×</button>
          </div>
          <div style={{display:'flex', flexDirection:'column'}}>
            {r.routine.map(exId => <ExCard key={exId} exId={exId} />)}
          </div>
          <button onClick={onClose} style={{width:'100%', padding:16, borderRadius:12, background:r.color, color:'#000', fontWeight:700, border:'none', marginTop:24}}>Training beenden</button>
        </div>
      </div>
    </div>
  );
}

function MobilityModal({onClose}) {
  return (
    <div className="modal-bg" onClick={onClose}>
      <div className="modal-sheet" onClick={e=>e.stopPropagation()}>
        <div style={{width:36, height:4, background:'var(--border-accent)', borderRadius:2, margin:'12px auto 20px'}} />
        <div style={{padding:'0 20px 32px'}}>
          <div style={{display:'flex', justifyContent:'space-between', alignItems:'flex-start', marginBottom:16}}>
            <div>
              <h2 style={{fontSize:20, fontWeight:800, color:C.sage}}>Mobility & Flow</h2>
              <p style={{fontSize:13, color:var(--dim)}}>Regeneration & Beweglichkeit</p>
            </div>
            <button onClick={onClose} style={{background:'var(--surface-2)', border:'none', color:var(--mid), width:32, height:32, borderRadius:50, cursor:'pointer', fontSize:18}}>×</button>
          </div>
          <div style={{display:'flex', flexDirection:'column'}}>
            {MOBILITY_ROUTINE.map(m => (
              <div key={m.id} className="exercise-row" style={{padding:'12px 0'}}>
                <div style={{display:'flex', gap:12}}>
                  <span style={{fontSize:20}}>{m.icon}</span>
                  <div style={{flex:1}}>
                    <div style={{fontSize:14, fontWeight:700, color:C.cloud}}>{m.name}</div>
                    <div style={{fontSize:12, color:var(--dim), marginTop:2}}>{m.dur} · {m.focus}</div>
                    <p style={{fontSize:13, color:var(--mid), marginTop:6, lineHeight:1.5}}>{m.desc}</p>
                    <a href={m.url} target="_blank" rel="noopener noreferrer" style={{display:'inline-block', marginTop:8, fontSize:12, color:C.sage, textDecoration:'none'}}>▶ Video Demo</a>
                  </div>
                </div>
              </div>
            ))}
          </div>
          <button onClick={onClose} style={{width:'100%', padding:16, borderRadius:12, background:C.sage, color:'#000', fontWeight:700, border:'none', marginTop:24}}>Schliessen</button>
        </div>
      </div>
    </div>
  );
}

function App() {
  const [activeWeek, setActiveWeek] = useState('w1');
  const [activeTab, setActiveTab] = useState('plan');
  const [selectedWorkout, setSelectedWorkout] = useState(null);
  const [showMobility, setShowMobility] = useState(false);

  const week = INITIAL_PLAN.find(w => w.id === activeWeek);

  return (
    <div style={{maxWidth:640, margin:'0 auto', padding:'env(safe-area-inset-top) 16px 100px'}}>
      <header style={{padding:'24px 0 32px', display:'flex', justifyContent:'space-between', alignItems:'flex-end'}}>
        <div>
          <div className="aneo-logo">ANEO<span>.</span></div>
          <h1 style={{fontSize:28, fontWeight:900, color:C.cloud, letterSpacing:'-0.03em', marginTop:4}}>Witiker Plan</h1>
        </div>
        <div style={{textAlign:'right'}}>
          <div style={{fontSize:11, fontWeight:700, color:var(--dim), textTransform:'uppercase', letterSpacing:'.1em'}}>Race Day</div>
          <div style={{fontSize:16, fontWeight:800, color:C.blush}}>14. Mai 2026</div>
        </div>
      </header>

      {activeTab === 'plan' && (
        <>
          <div style={{display:'flex', gap:8, overflowX:'auto', paddingBottom:16, scrollbarWidth:'none'}} className="no-scrollbar">
            {INITIAL_PLAN.map(w => (
              <button key={w.id} onClick={()=>setActiveWeek(w.id)} className={`week-tab ${activeWeek===w.id?'active':''}`}>
                {w.label}
              </button>
            ))}
          </div>

          <div style={{marginTop:8}}>
            <div className="section-title">{week.label} · {week.name}</div>
            {week.days.map(day => (
              <div key={day.date} className="card" style={{display:'flex', gap:16, alignItems:'center'}}>
                <div style={{width:36, textAlign:'center', flexShrink:0}}>
                  <div style={{fontSize:10, fontWeight:700, color:var(--dim), textTransform:'uppercase'}}>{day.label}</div>
                  <div style={{fontSize:18, fontWeight:900, color:C.cloud}}>{day.date.split('-')[2]}</div>
                </div>
                <div style={{flex:1, display:'flex', flexDirection:'column', gap:8}}>
                  {day.workouts.length === 0 ? (
                    <div style={{fontSize:14, color:var(--dim), fontStyle:'italic'}}>Rest Day</div>
                  ) : (
                    day.workouts.map(w => (
                      <div key={w.id} onClick={()=>{ if(w.type==='mobility') setShowMobility(true); else setSelectedWorkout({w, day}); }} 
                        style={{cursor:'pointer', display:'flex', justifyContent:'space-between', alignItems:'center'}}>
                        <div>
                          <div style={{fontSize:15, fontWeight:700, color:C.cloud}}>{w.title || (w.type==='strength'?ST[w.routineKey].name:'Mobility')}</div>
                          <div style={{fontSize:12, color:var(--mid)}}>{w.type==='run'?`${w.km}km · ${w.hr}`:w.type==='strength'?ST[w.routineKey].focus:'Flow'}</div>
                        </div>
                        <div style={{fontSize:18}}>{w.type==='run'?'🏃':w.type==='strength'?'💪':'🧘'}</div>
                      </div>
                    ))
                  )}
                </div>
              </div>
            ))}
          </div>
        </>
      )}

      {activeTab === 'stats' && (
        <div style={{padding:'40px 0', textAlign:'center'}}>
          <div style={{fontSize:48, marginBottom:16}}>📊</div>
          <h2 style={{fontSize:20, fontWeight:800, color:C.cloud}}>Statistiken</h2>
          <p style={{color:var(--dim), marginTop:8}}>Deine Fortschritte werden hier bald visualisiert.</p>
        </div>
      )}

      <nav className="bottom-nav">
        <div className={`bottom-nav-item ${activeTab==='plan'?'active':''}`} onClick={()=>setActiveTab('plan')}>
          <span style={{fontSize:22}}>📅</span>
          <span className="bottom-nav-label">Plan</span>
        </div>
        <div className={`bottom-nav-item ${activeTab==='stats'?'active':''}`} onClick={()=>setActiveTab('stats')}>
          <span style={{fontSize:22}}>📈</span>
          <span className="bottom-nav-label">Stats</span>
        </div>
        <div className="bottom-nav-item" onClick={()=>setShowMobility(true)}>
          <span style={{fontSize:22}}>🧘</span>
          <span className="bottom-nav-label">Flow</span>
        </div>
      </nav>

      {selectedWorkout && selectedWorkout.w.type === 'run' && (
        <RunModal workout={selectedWorkout.w} day={selectedWorkout.day} onClose={()=>setSelectedWorkout(null)} />
      )}
      {selectedWorkout && selectedWorkout.w.type === 'strength' && (
        <StrengthModal workout={selectedWorkout.w} day={selectedWorkout.day} onClose={()=>setSelectedWorkout(null)} />
      )}
      {showMobility && <MobilityModal onClose={()=>setShowMobility(false)} />}
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
</script>
</body>
</html>
