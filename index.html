  <style>
    :root {
      --bg:       #070809;
      --s1:       #0D0F12;
      --s2:       #131519;
      --s3:       #191C22;
      --orange:   #F97316;
      --orange-d: rgba(249,115,22,0.13);
      --orange-b: rgba(249,115,22,0.38);
      --blue:     #3B6FD4;
      --blue-d:   rgba(59,111,212,0.15);
      --blue-b:   rgba(59,111,212,0.4);
      --violet:   #8B5CF6;
      --violet-d: rgba(139,92,246,0.15);
      --violet-b: rgba(139,92,246,0.38);
      --red:      #F87171;
      --amber:    #FBBF24;
      --text:     #E8EAF0;
      --td:       rgba(232,234,240,0.45);
      --tf:       rgba(232,234,240,0.2);
      --border:   rgba(232,234,240,0.08);
      --borderS:  rgba(232,234,240,0.18);
    }
    *{box-sizing:border-box;margin:0;padding:0;}
    html{scroll-behavior:smooth;-webkit-text-size-adjust:100%;}
    body{background:var(--bg);color:var(--text);font-family:'Barlow',system-ui,sans-serif;min-height:100vh;-webkit-font-smoothing:antialiased;overflow-x:hidden;}
    h1,h2,h3,.bc{font-family:'Barlow Condensed',system-ui,sans-serif;}
    ::-webkit-scrollbar{width:3px;height:3px;}
    ::-webkit-scrollbar-track{background:transparent;}
    ::-webkit-scrollbar-thumb{background:rgba(238,242,238,0.1);border-radius:2px;}
    .tag{display:inline-flex;align-items:center;padding:2px 7px;border-radius:3px;font-size:10px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;white-space:nowrap;font-family:'Barlow Condensed',sans-serif;}
    .modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.88);backdrop-filter:blur(10px);z-index:60;display:flex;align-items:flex-end;justify-content:center;padding:0;}
    @media(min-width:640px){.modal-bg{align-items:center;padding:16px;}}
    .modal-sheet{background:var(--s1);border:1px solid var(--borderS);border-radius:20px 20px 0 0;width:100%;max-height:92vh;overflow-y:auto;}
    @media(min-width:640px){.modal-sheet{max-width:620px;border-radius:18px;}}
    .week-tab{padding:7px 14px;border-radius:5px;font-family:'Barlow Condensed',sans-serif;font-size:14px;font-weight:800;letter-spacing:.05em;text-transform:uppercase;white-space:nowrap;cursor:pointer;transition:all .15s;border:1px solid rgba(232,234,240,.12);background:rgba(232,234,240,.06);}
    .week-tab.active{background:var(--orange);color:#070809;border-color:var(--orange);}
    .week-tab:not(.active){color:rgba(232,234,240,.5);}
    .week-tab:not(.active):hover{color:rgba(232,234,240,.9);background:rgba(232,234,240,.1);}
    .pill{display:flex;align-items:center;gap:12px;padding:14px 16px;border-radius:11px;cursor:pointer;transition:all .15s;-webkit-tap-highlight-color:transparent;user-select:none;-webkit-user-select:none;min-height:56px;}
    .pill:active{opacity:.7;transform:scale(.98);}
    .pill.dragging{opacity:.3;transform:scale(.95);}
    .drop-zone.over{border-color:var(--orange)!important;background:rgba(249,115,22,.06)!important;}
    .bottom-nav{position:fixed;bottom:0;left:0;right:0;background:rgba(7,8,9,.98);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-top:1px solid var(--border);z-index:40;padding:10px 0 0;padding-bottom:max(20px,env(safe-area-inset-bottom));display:flex;}
    .bottom-nav-btn{flex:1;display:flex;flex-direction:column;align-items:center;gap:4px;padding:4px 8px;cursor:pointer;-webkit-tap-highlight-color:transparent;background:none;border:none;min-height:50px;}
    @media(max-width:639px){.desktop-only{display:none!important;}}
    @media(min-width:640px){.mobile-only{display:none!important;}.bottom-nav{display:none!important;}}
    .stat-card{background:var(--s2);border:1px solid var(--border);border-radius:10px;padding:12px 8px;text-align:center;}
    .day-card{background:var(--s1);border:1px solid var(--border);border-radius:16px;padding:18px;transition:border-color .15s;}
    .ex-row{border-bottom:1px solid var(--border);padding:12px 2px;}
    .ex-row:last-child{border-bottom:none;}
    @keyframes todayPulse{0%,100%{box-shadow:0 0 0 2px rgba(249,115,22,.4),0 0 18px rgba(249,115,22,.15);}50%{box-shadow:0 0 0 2px rgba(249,115,22,.7),0 0 28px rgba(249,115,22,.28);}}
    @keyframes fadeIn{from{opacity:0;transform:translateY(5px);}to{opacity:1;transform:translateY(0);}}
    .fi{animation:fadeIn .2s ease forwards;}
    .prog-bar{height:3px;background:rgba(238,242,238,0.06);border-radius:2px;overflow:hidden;margin-bottom:14px;}
    .prog-fill{height:100%;border-radius:2px;transition:width .6s ease;}
    .ibtn{background:var(--s2);border:1px solid var(--border);color:var(--td);border-radius:7px;width:32px;height:32px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0;transition:all .15s;}
    .ibtn:hover{border-color:var(--borderS);color:var(--text);}
    /* Drag move indicator */
    .move-hint{font-size:10px;color:var(--td);letter-spacing:.04em;text-align:center;padding:6px 0 0;font-family:'Barlow Condensed',sans-serif;}
    @keyframes spin{to{transform:rotate(360deg);}}
  </style>
</head>

/* ── YOUTUBE DEEPLINK ────────────────────────────── */
function ytLink(query){
  const q=encodeURIComponent(query);
  // youtube:// deeplink → falls YT-App installiert, öffnet direkt; fallback https
  return `youtube://www.youtube.com/results?search_query=${q}`;
}
function ytWeb(query){return `https://www.youtube.com/results?search_query=${encodeURIComponent(query)}`;}
function openYT(query){
  const deep=ytLink(query);
  const web=ytWeb(query);
  // Try deep link, fall back to web after short delay
  const a=document.createElement('a');a.href=deep;a.click();
  setTimeout(()=>{window.open(web,'_blank');},1500);
}

function kmDoneWeek(week,completed,stravaActual,stravaExtras){
  const sa=stravaActual||{};
  const se=stravaExtras||{};
  let total=0;
  week.days.forEach(d=>{
    d.workouts.filter(w=>w.type==='run'&&completed[w.id]).forEach(w=>{
      total+=sa[w.id]!=null?sa[w.id]:(w.km||0);
    });
    (se[d.date]||[]).forEach(ex=>{
      if(stravaCat(ex.type)==='run'&&ex.distance>0)total+=Math.round(ex.distance/100)/10;
    });
  });
  return total;
}

const SK={cid:'aneo_sc',csec:'aneo_ss',token:'aneo_st',actual:'aneo_sa',extras:'aneo_se'};
const STRAVA_RUN=['Run','TrailRun','Hike','Walk','VirtualRun','NordicSki'];
const STRAVA_STRENGTH=['WeightTraining','Workout','Crossfit','RockClimbing'];
const STRAVA_MOBILITY=['Yoga','Pilates','Stretching','MindAndBody'];
const STRAVA_LABEL={Run:'Lauf',TrailRun:'Trail',Walk:'Walk',Hike:'Wanderung',VirtualRun:'V.Lauf',NordicSki:'Ski',WeightTraining:'Kraft',Workout:'Workout',Crossfit:'Crossfit',RockClimbing:'Klettern',Yoga:'Yoga',Pilates:'Pilates',Stretching:'Stretching',MindAndBody:'Mobility',Ride:'Bike',VirtualRide:'V.Bike',Swim:'Schwimmen'};
function stravaCat(t){
  if(STRAVA_RUN.includes(t))return 'run';
  if(STRAVA_STRENGTH.includes(t))return 'strength';
  if(STRAVA_MOBILITY.includes(t))return 'mobility';
  return 'run';
}
function stravaAuthUrl(cid){
  const p=new URLSearchParams({client_id:cid,redirect_uri:window.location.origin+window.location.pathname,response_type:'code',approval_prompt:'auto',scope:'activity:read_all'});
  return `https://www.strava.com/oauth/authorize?${p}`;
}
async function stravaPost(body){
  const r=await fetch('https://www.strava.com/oauth/token',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)});
  return r.json();
}
async function stravaGet(path,tok){
  const r=await fetch(`https://www.strava.com/api/v3${path}`,{headers:{Authorization:`Bearer ${tok}`}});
  if(!r.ok)throw new Error(r.status);
  return r.json();
}

/* ── MOVE MODAL (Kalender) ───────────────────────── */
function MoveModal({woId,sourceDayDate,sourceWeekId,plan,onMove,onClose}){
  const today=new Date();
  const [viewYear,setViewYear]=useState(today.getFullYear());
  const [viewMonth,setViewMonth]=useState(today.getMonth());

  const availDays=new Set();
  plan.forEach(wk=>wk.days.forEach(d=>{if(d.date!==sourceDayDate)availDays.add(d.date);}));

  const firstDay=new Date(viewYear,viewMonth,1);
  const lastDay=new Date(viewYear,viewMonth+1,0);
  let startDow=firstDay.getDay();
  startDow=(startDow+6)%7;

  const cells=[];
  for(let i=0;i<startDow;i++)cells.push(null);
  for(let d=1;d<=lastDay.getDate();d++)cells.push(new Date(viewYear,viewMonth,d));

  const MONTHS=['Januar','Februar','März','April','Mai','Juni','Juli','August','September','Oktober','November','Dezember'];
  const DOW=['Mo','Di','Mi','Do','Fr','Sa','So'];
  const todayStr=today.toISOString().slice(0,10);

  function ds(d){
    if(!d)return null;
    return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
  }

  function handleDay(dateStr){
    if(!availDays.has(dateStr))return;
    let wkId=null;
    plan.forEach(wk=>wk.days.forEach(d=>{if(d.date===dateStr)wkId=wk.id;}));
    if(wkId!==null){onMove(woId,sourceDayDate,sourceWeekId,dateStr,wkId);onClose();}
  }

  function prevMonth(){if(viewMonth===0){setViewMonth(11);setViewYear(y=>y-1);}else setViewMonth(m=>m-1);}
  function nextMonth(){if(viewMonth===11){setViewMonth(0);setViewYear(y=>y+1);}else setViewMonth(m=>m+1);}

  return(
    <div className="modal-bg" onClick={onClose}>
      <div className="modal-sheet" onClick={e=>e.stopPropagation()} style={{maxHeight:'85vh'}}>
        <div style={{padding:'16px 18px',borderBottom:'1px solid var(--border)',display:'flex',justifyContent:'space-between',alignItems:'center'}}>
          <div style={{fontFamily:"'Barlow Condensed',sans-serif",fontSize:18,fontWeight:800}}>Training verschieben</div>
          <button className="ibtn" onClick={onClose}>×</button>
        </div>
        <div style={{padding:16}}>
          <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:14}}>
            <button onClick={prevMonth} className="ibtn" style={{fontSize:20,fontWeight:300}}>‹</button>
            <div style={{fontFamily:"'Barlow Condensed',sans-serif",fontSize:17,fontWeight:800,letterSpacing:'.04em'}}>{MONTHS[viewMonth]} {viewYear}</div>
            <button onClick={nextMonth} className="ibtn" style={{fontSize:20,fontWeight:300}}>›</button>
          </div>
          <div style={{display:'grid',gridTemplateColumns:'repeat(7,1fr)',gap:2,marginBottom:4}}>
            {DOW.map(d=>(
              <div key={d} style={{textAlign:'center',fontSize:10,fontWeight:700,color:'var(--tf)',letterSpacing:'.04em',padding:'3px 0',fontFamily:"'Barlow Condensed',sans-serif"}}>{d}</div>
            ))}
          </div>
          <div style={{display:'grid',gridTemplateColumns:'repeat(7,1fr)',gap:2}}>
            {cells.map((d,i)=>{
              if(!d)return <div key={`e${i}`}/>;
              const dStr=ds(d);
              const isToday=dStr===todayStr;
              const isSource=dStr===sourceDayDate;
              const isAvail=availDays.has(dStr);
              return(
                <div key={dStr}
                  onClick={()=>handleDay(dStr)}
                  style={{
                    aspectRatio:'1',display:'flex',alignItems:'center',justifyContent:'center',
                    borderRadius:'50%',fontSize:13,
                    fontWeight:isAvail||isToday?700:400,
                    cursor:isAvail&&!isSource?'pointer':'default',
                    background:isToday?'rgba(249,115,22,.18)':isSource?'rgba(232,234,240,.04)':isAvail?'rgba(59,111,212,.18)':'transparent',
                    border:isToday?'2px solid #F97316':isSource?'1px solid rgba(232,234,240,.12)':'1px solid transparent',
                    color:isSource?'rgba(232,234,240,.18)':isAvail?'var(--text)':'rgba(232,234,240,.2)',
                    transition:'all .1s',
                  }}>
                  {d.getDate()}
                </div>
              );
            })}
          </div>
          <div style={{marginTop:14,display:'flex',gap:16,fontSize:11,color:'var(--tf)'}}>
            <span><span style={{color:'#F97316'}}>●</span> Heute</span>
            <span><span style={{color:'#3B6FD4'}}>●</span> Verfügbar</span>
          </div>
        </div>
      </div>
    </div>
  );
}

          ['Witiker Simulation Sa KW18','39.5km / 5 Runden auf Originalstrecke, Ernährungstest, Crew-Protokoll'],
          ['HR-Zonen kalibriert','HRmax 198 – Z2 = 129–158bpm. Alle Einheiten HR-geführt'],
        ].map(([t,d],i)=>(
          <div key={i} style={{display:'flex',gap:10,marginBottom:10,paddingBottom:10,borderBottom:i<5?'1px solid var(--border)':'none'}}>
            <span style={{color:'#F97316',flexShrink:0,fontSize:10,marginTop:4}}>▶</span>
            <div>
              <div style={{fontSize:13,fontWeight:600}}>{t}</div>
              <div style={{fontSize:12,color:'var(--td)',marginTop:2}}>{d}</div>
            </div>
          </div>
        ))}
      </div>
    </div>
  );
}

/* ══════════════════════════════════════════════════
   MAIN APP
   ══════════════════════════════════════════════════ */
function App(){
  const [activeTab,setActiveTab]=useState('plan');
  const [activeWeek,setActiveWeek]=useState(()=>{
    // Auto-select the week that contains today
    const todayStr=new Date().toISOString().slice(0,10);
    const idx=INIT_WEEKS.findIndex(w=>w.days.some(d=>d.date===todayStr));
    return idx>=0?idx:0;
  });
  const [modal,setModal]=useState(null);
  const [moveModal,setMoveModal]=useState(null);
  const [stravaSetup,setStravaSetup]=useState(false);
  const [stravaToken,setStravaToken]=useState(()=>{try{return JSON.parse(localStorage.getItem(SK.token)||'null');}catch(e){return null;}});
  const [stravaActual,setStravaActual]=useState(()=>{try{return JSON.parse(localStorage.getItem(SK.actual)||'{}');}catch(e){return{};}});
  const [stravaExtras,setStravaExtras]=useState(()=>{try{return JSON.parse(localStorage.getItem(SK.extras)||'{}');}catch(e){return{};}});
  const [syncing,setSyncing]=useState(false);
  const [lastSync,setLastSync]=useState(null);
  const [syncError,setSyncError]=useState(null);
  const [lastActsRaw,setLastActsRaw]=useState([]);
  const [debugOpen,setDebugOpen]=useState(false);

  // ── PERSISTENT STATE: completed ───────────────────
  const [completed,setCompleted]=useState(()=>{
    try{
      const saved=localStorage.getItem('aneo_completed');
      return saved?JSON.parse(saved):{};
    }catch(e){return {};}
  });

  // ── PERSISTENT STATE: plan (workout order) ────────
  const [plan,setPlan]=useState(()=>{
    try{
      const ver=localStorage.getItem('aneo_plan_ver');
      if(ver!==PLAN_VERSION){
        localStorage.removeItem('aneo_plan');
        localStorage.setItem('aneo_plan_ver',PLAN_VERSION);
        return INIT_WEEKS;
      }
      const saved=localStorage.getItem('aneo_plan');
      return saved?JSON.parse(saved):INIT_WEEKS;
    }catch(e){return INIT_WEEKS;}
  });

  // Save completed to localStorage whenever it changes
  useEffect(()=>{
    try{localStorage.setItem('aneo_completed',JSON.stringify(completed));}catch(e){}
  },[completed]);

  // Save plan to localStorage whenever it changes
  useEffect(()=>{
    try{localStorage.setItem('aneo_plan',JSON.stringify(plan));}catch(e){}
  },[plan]);

  // Auto-jump to today's week on first load, or next upcoming week
  useEffect(()=>{
    const todayStr=new Date().toISOString().slice(0,10);
    let idx=plan.findIndex(wk=>wk.days.some(d=>d.date===todayStr));
    if(idx<0){idx=plan.findIndex(wk=>wk.days.some(d=>d.date>=todayStr));}
    if(idx>=0)setActiveWeek(idx);
  },[]);// eslint-disable-line

  // Auto-sync: beim Öffnen, beim Tab-Wechsel, beim Window-Focus, alle 5 Min im Hintergrund
  useEffect(()=>{
    if(!stravaToken)return;
    doSync();
    function onVisible(){if(document.visibilityState==='visible')doSync();}
    function onFocus(){doSync();}
    document.addEventListener('visibilitychange',onVisible);
    window.addEventListener('focus',onFocus);
    const interval=setInterval(()=>{if(document.visibilityState==='visible')doSync();},5*60*1000);
    return()=>{
      document.removeEventListener('visibilitychange',onVisible);
      window.removeEventListener('focus',onFocus);
      clearInterval(interval);
    };
  },[!!stravaToken]);// eslint-disable-line

  // Strava OAuth callback handler
  useEffect(()=>{
    const params=new URLSearchParams(window.location.search);
    const code=params.get('code');
    if(!code)return;
    window.history.replaceState({},'',window.location.pathname);
    const cid=localStorage.getItem(SK.cid);
    const csec=localStorage.getItem(SK.csec);
    if(!cid||!csec){setStravaSetup(true);return;}
    (async()=>{
      try{
        const data=await stravaPost({client_id:cid,client_secret:csec,code,grant_type:'authorization_code'});
        if(data.access_token){
          const tok={access_token:data.access_token,refresh_token:data.refresh_token,expires_at:data.expires_at};
          localStorage.setItem(SK.token,JSON.stringify(tok));
          setStravaToken(tok);
          doSync(tok,cid,csec);
        }else{setSyncError('Strava Auth: '+JSON.stringify(data));}
      }catch(e){alert('Strava Verbindung fehlgeschlagen.');}
    })();
  },[]);// eslint-disable-line

  async function doSync(tok,cid,csec){
    setSyncing(true);
    setSyncError(null);
    try{
      let t=tok||stravaToken;
      if(!t){setSyncing(false);setStravaSetup(true);return;}
      // Refresh token if expired
      if(t.expires_at*1000<Date.now()+60000){
        const cidVal=cid||localStorage.getItem(SK.cid);
        const csecVal=csec||localStorage.getItem(SK.csec);
        const fresh=await stravaPost({client_id:cidVal,client_secret:csecVal,refresh_token:t.refresh_token,grant_type:'refresh_token'});
        t={access_token:fresh.access_token,refresh_token:fresh.refresh_token,expires_at:fresh.expires_at};
        localStorage.setItem(SK.token,JSON.stringify(t));
        setStravaToken(t);
      }
      // Date range from plan
      const allDates=plan.flatMap(wk=>wk.days.map(d=>d.date)).filter(Boolean).sort();
      const after=Math.floor(new Date(allDates[0]).getTime()/1000)-86400;
      const before=Math.floor(new Date(allDates[allDates.length-1]).getTime()/1000)+86400;
      // Strava liefert max. 100 Aktivitäten pro Seite → paginieren bis alles geladen
      const acts=[];
      for(let page=1;page<=20;page++){
        const batch=await stravaGet(`/athlete/activities?after=${after}&before=${before}&per_page=100&page=${page}`,t.access_token);
        if(!batch||!batch.length)break;
        acts.push(...batch);
        if(batch.length<100)break;
      }
      setLastActsRaw(acts);
      console.log('[Strava sync]',acts.length,'Aktivitäten geladen',acts.slice(-5).map(a=>({date:a.start_date_local?.slice(0,10),type:a.type,sport_type:a.sport_type,name:a.name,km:(a.distance/1000).toFixed(2)})));
      // Group by date (all types)
      const byDate={};
      acts.forEach(a=>{
        const d=a.start_date_local.slice(0,10);
        if(!byDate[d])byDate[d]=[];
        byDate[d].push(a);
      });
      // Match Strava-Activities → Planned Workouts (1:1, kein Threshold). Übrige = Extras.
      const newCompleted={...completed};
      const newActual={};
      const newExtras={};
      plan.forEach(wk=>wk.days.forEach(d=>{
        const dayActs=byDate[d.date]||[];
        const consumed=new Set();
        d.workouts.forEach(wo=>{
          if(wo.type==='run'&&wo.km){
            const planned=wo.km*1000;
            const cands=dayActs.map((a,i)=>({a,i})).filter(({a,i})=>!consumed.has(i)&&STRAVA_RUN.includes(a.type));
            const best=cands.sort((x,y)=>Math.abs(x.a.distance-planned)-Math.abs(y.a.distance-planned))[0];
            if(best){consumed.add(best.i);newCompleted[wo.id]=true;newActual[wo.id]=Math.round(best.a.distance/100)/10;}
          }else if(wo.type==='strength'){
            const idx=dayActs.findIndex((a,k)=>!consumed.has(k)&&STRAVA_STRENGTH.includes(a.type));
            if(idx>=0){consumed.add(idx);newCompleted[wo.id]=true;}
          }else if(wo.type==='mobility'){
            const idx=dayActs.findIndex((a,k)=>!consumed.has(k)&&STRAVA_MOBILITY.includes(a.type));
            if(idx>=0){consumed.add(idx);newCompleted[wo.id]=true;}
          }
        });
        const ex=dayActs.filter((_,i)=>!consumed.has(i)).map(a=>({id:String(a.id),type:a.type,name:a.name,distance:a.distance}));
        if(ex.length)newExtras[d.date]=ex;
      }));
      setCompleted(newCompleted);
      setStravaActual(newActual);
      setStravaExtras(newExtras);
      localStorage.setItem(SK.actual,JSON.stringify(newActual));
      localStorage.setItem(SK.extras,JSON.stringify(newExtras));
      setLastSync(new Date().toLocaleTimeString('de-CH',{hour:'2-digit',minute:'2-digit'}));
    }catch(e){setSyncError(e.message||'Sync fehlgeschlagen');}
    setSyncing(false);
  }

  // Drag state
  const [dragWo,setDragWo]=useState(null);
  const [dragOver,setDragOver]=useState(null);

  const week=plan[activeWeek];

  const toggleComplete=useCallback((id)=>{
    setCompleted(prev=>({...prev,[id]:!prev[id]}));
  },[]);

  // Move workout between days
  const moveWorkout=useCallback((woId,srcDate,srcWkId,dstDate,dstWkId)=>{
    setPlan(prev=>{
      const next=prev.map(wk=>({...wk,days:wk.days.map(d=>({...d,workouts:[...d.workouts]}))}));
      let wo=null;
      const srcWk=next.find(w=>w.id===srcWkId);
      if(srcWk){
        const srcDay=srcWk.days.find(d=>d.date===srcDate);
        if(srcDay){const idx=srcDay.workouts.findIndex(w=>w.id===woId);if(idx>-1){wo=srcDay.workouts.splice(idx,1)[0];}}
      }
      if(!wo)return prev;
      const dstWk=next.find(w=>w.id===dstWkId);
      if(dstWk){
        const dstDay=dstWk.days.find(d=>d.date===dstDate);
        if(dstDay)dstDay.workouts.push(wo);
      }
      return next;
    });
  },[]);

  const RACE_DATE=new Date('2026-05-14T12:00:00');
  const daysLeft=Math.max(0,Math.ceil((RACE_DATE-new Date())/86400000));
  const kmDone=useMemo(()=>kmDoneWeek(week,completed,stravaActual,stravaExtras),[week,completed,stravaActual,stravaExtras]);
  const pct=Math.round(kmDone/week.targetKm*100);
  const barPct=Math.min(100,pct);

  function openWorkout(wo,d){setModal({wo,day:d});}
  function closeModal(){setModal(null);}

  /* ── DRAG & DROP (touch + mouse) ─────────────────── */
  // Touch drag state
  const touchDrag=useRef(null);

  function handleDragStart(wo,day,weekId,e){
    if(e&&e.dataTransfer){e.dataTransfer.effectAllowed='move';}
    setDragWo({woId:wo.id,sourceDayDate:day.date,sourceWeekId:weekId});
  }
  function handleDragOver(date,e){
    if(e){e.preventDefault();e.dataTransfer&&(e.dataTransfer.dropEffect='move');}
    setDragOver(date);
  }
  function handleDrop(date,weekId,e){
    if(e)e.preventDefault();
    if(dragWo&&dragWo.sourceDayDate!==date){
      moveWorkout(dragWo.woId,dragWo.sourceDayDate,dragWo.sourceWeekId,date,weekId);
    }
    setDragWo(null);setDragOver(null);
  }
  function handleDragEnd(){setDragWo(null);setDragOver(null);}

  function renderModal(){
    if(!modal)return null;
    const {wo,day}=modal;
    const isDone=!!completed[wo.id];
    if(wo.type==='run')return<RunModal wo={wo} day={day} onClose={closeModal} onToggle={toggleComplete} isDone={isDone}/>;
    if(wo.type==='strength')return<StrModal wo={wo} onClose={closeModal} onToggle={toggleComplete} isDone={isDone}/>;
    if(wo.type==='mobility')return<MobilityModal wo={wo} onClose={closeModal} onToggle={toggleComplete} isDone={isDone}/>;
    return null;
  }

  const PHASE_COLORS={Basis:'#3B6FD4',Aufbau:'#F97316',Peak:'#F87171',Taper:'#8B5CF6',Race:'#FBBF24'};

  return(
    <div style={{minHeight:'100vh',background:'var(--bg)'}}>
      {/* ── HEADER ─────────────────────────────────── */}
      <div style={{position:'sticky',top:0,zIndex:50,background:'rgba(7,8,9,.97)',backdropFilter:'blur(14px)',borderBottom:'1px solid var(--border)',paddingTop:'env(safe-area-inset-top)'}}>
        <div style={{maxWidth:900,margin:'0 auto',padding:'11px 16px',display:'flex',justifyContent:'space-between',alignItems:'center'}}>
          <AneoBrand size={30}/>
          <div style={{display:'flex',alignItems:'center',gap:8}}>
            <div style={{fontFamily:"'Barlow Condensed',sans-serif",fontSize:13,color:'var(--td)',letterSpacing:'.04em'}}>
              <span style={{color:'#F97316',fontWeight:800,fontSize:17}}>{daysLeft}</span> Tage bis Witikon
            </div>
            {stravaToken?(
              <button onClick={()=>doSync()} disabled={syncing}
                style={{background:'rgba(252,76,2,.12)',border:'1px solid rgba(252,76,2,.35)',color:'#FC4C02',borderRadius:5,padding:'4px 9px',cursor:'pointer',fontSize:11,fontFamily:"'Barlow Condensed',sans-serif",fontWeight:700,letterSpacing:'.04em',display:'flex',alignItems:'center',gap:4}}>
                <span style={{fontSize:12,display:'inline-block',animation:syncing?'spin 1s linear infinite':'none'}}>⟳</span>
                {lastSync?lastSync:'Strava'}
              </button>
            ):(
              <button onClick={()=>setStravaSetup(true)}
                style={{background:'rgba(252,76,2,.08)',border:'1px solid rgba(252,76,2,.25)',color:'rgba(252,76,2,.7)',borderRadius:5,padding:'4px 9px',cursor:'pointer',fontSize:11,fontFamily:"'Barlow Condensed',sans-serif",fontWeight:700,letterSpacing:'.04em'}}>
                Strava
              </button>
            )}
            {stravaToken&&(
              <button
                onClick={()=>setDebugOpen(true)}
                style={{background:'rgba(232,234,240,.06)',border:'1px solid rgba(232,234,240,.12)',color:'rgba(232,234,240,.45)',borderRadius:5,padding:'4px 9px',cursor:'pointer',fontSize:11,fontFamily:"'Barlow Condensed',sans-serif",fontWeight:700,letterSpacing:'.04em'}}
                title="Strava Debug">ⓘ</button>
            )}
            <button
              onClick={()=>window.location.reload()}
              style={{background:'rgba(232,234,240,.06)',border:'1px solid rgba(232,234,240,.12)',color:'rgba(232,234,240,.35)',borderRadius:5,padding:'4px 9px',cursor:'pointer',fontSize:11,fontFamily:"'Barlow Condensed',sans-serif",fontWeight:700,letterSpacing:'.04em'}}
              title="App neu laden">↺</button>
          </div>
        </div>
        {/* Desktop nav */}
        <div className="desktop-only" style={{maxWidth:900,margin:'0 auto',padding:'0 16px 11px',display:'flex',gap:6}}>
          {[['plan','Plan'],['zones','HR-Zonen'],['overview','Übersicht']].map(([t,l])=>(
            <button key={t} onClick={()=>setActiveTab(t)} className={`week-tab ${activeTab===t?'active':''}`}>{l}</button>
          ))}
        </div>
      </div>

      {syncError&&(
        <div onClick={()=>setSyncError(null)} style={{background:'rgba(248,113,113,.12)',borderBottom:'1px solid rgba(248,113,113,.35)',padding:'8px 16px',fontSize:12,color:'#F87171',cursor:'pointer',textAlign:'center'}}>
          ⚠ Strava Sync Fehler: {syncError} · Tippen zum Schliessen
        </div>
      )}

      <div style={{maxWidth:900,margin:'0 auto',padding:'18px 16px',paddingBottom:'max(120px, calc(90px + env(safe-area-inset-bottom)))'}}>

        {/* ── PLAN TAB ─────────────────────────────── */}
        {activeTab==='plan'&&(
          <div className="fi">
            {/* Week tabs */}
            <div style={{display:'flex',gap:6,overflowX:'auto',paddingBottom:8,marginBottom:16,scrollbarWidth:'none',msOverflowStyle:'none'}}>
              {plan.map((w,i)=>(
                <button key={w.id} onClick={()=>setActiveWeek(i)} className={`week-tab ${activeWeek===i?'active':''}`}>
                  <span style={{fontWeight:800}}>{w.label}</span>
                  <span style={{opacity:.45,fontWeight:400,marginLeft:5,fontSize:11}}>{w.targetKm}km</span>
                </button>
              ))}
            </div>

            {/* Week summary card */}
            <div style={{background:'var(--s1)',border:'1px solid var(--border)',borderRadius:13,padding:16,marginBottom:16}}>
              <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:12}}>
                <div>
                  <div style={{display:'flex',alignItems:'center',gap:8,flexWrap:'wrap'}}>
                    <div style={{fontFamily:"'Barlow Condensed',sans-serif",fontSize:22,fontWeight:900,letterSpacing:'.02em'}}>{week.label} – {week.name}</div>
                    <span className="tag" style={{background:`${PHASE_COLORS[week.phase]||'#3B6FD4'}20`,color:PHASE_COLORS[week.phase]||'#3B6FD4'}}>{week.phase}</span>
                  </div>
                  <div style={{fontSize:12,color:'var(--td)',marginTop:3}}>{week.dateRange}</div>
                </div>
                <div style={{textAlign:'right'}}>
                  <div style={{fontFamily:"'Barlow Condensed',sans-serif",fontSize:26,fontWeight:900,lineHeight:1}}>
                    {Math.round(kmDone)}<span style={{fontSize:13,color:'var(--tf)',fontWeight:400}}>/{week.targetKm}km</span>
                  </div>
                  <div style={{fontSize:11,color:'var(--tf)',marginTop:3}}>{pct}% erledigt</div>
                </div>
              </div>
              <div className="prog-bar">
                <div className="prog-fill" style={{width:`${barPct}%`,background:week.color}}/>
              </div>
              <div style={{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:8}}>
                {[
                  {l:'Lauftage',v:week.days.filter(d=>d.workouts.some(w=>w.type==='run')).length,c:'#3B6FD4'},
                  {l:'Kraft',v:`${week.days.filter(d=>d.workouts.some(w=>w.type==='strength')).length}×`,c:'#F97316'},
                  {l:'Speed',v:`${week.days.filter(d=>d.workouts.some(w=>w.tags?.some(t=>['Speed','Hills','Fartlek','Tempo','Intervalle'].includes(t)))).length}×`,c:'#F87171'},
                ].map(s=>(
                  <div key={s.l} className="stat-card">
                    <div style={{fontFamily:"'Barlow Condensed',sans-serif",fontSize:24,fontWeight:900,color:s.c}}>{s.v}</div>
                    <div style={{fontSize:10,fontWeight:700,color:'var(--tf)',letterSpacing:'.06em',textTransform:'uppercase',marginTop:2}}>{s.l}</div>
                  </div>
                ))}
              </div>
            </div>

            {/* Drag hint */}
            <div className="move-hint" style={{marginBottom:10,opacity:.6}}>⠿ Trainings per Drag & Drop verschieben · oder → Pfeil antippen</div>

            {/* Day cards */}
            <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(275px,1fr))',gap:14}}>
              {week.days.map(d=>{
                const isRace=d.workouts.some(w=>w.type==='race');
                if(isRace)return(
                  <div key={d.date} style={{gridColumn:'1 / -1',background:'rgba(249,115,22,.08)',border:'2px solid rgba(249,115,22,.4)',borderRadius:14,padding:28,textAlign:'center'}}>
                    <svg viewBox="0 0 1024 1024" width={44} height={44} style={{margin:'0 auto 10px',display:'block'}}>
                      <path fill="#F97316" d={LOGO_PATH}/>
                    </svg>
                    <div style={{fontFamily:"'Barlow Condensed',sans-serif",fontSize:32,fontWeight:900,color:'#F97316',letterSpacing:'.05em'}}>WITIKER BACKYARD ULTRA</div>
                    <div style={{fontSize:13,color:'var(--td)',marginTop:6}}>Donnerstag, 14. Mai 2026 · Start 12:00 Uhr · Schweizer Rekord oder sterbe beim Versuch.</div>
                  </div>
                );

                const isOver=dragOver===d.date;
                const allDone=d.workouts.filter(w=>w.type!=='mobility').every(w=>completed[w.id]);
                const todayStr=new Date().toISOString().slice(0,10);
                const isToday=d.date===todayStr;
                // Mark next upcoming day if today not in plan
                const allDates=plan.flatMap(wk=>wk.days.map(dd=>dd.date));
                const hasToday=allDates.includes(todayStr);
                const isNextUp=!hasToday && d.date===allDates.filter(dt=>dt>=todayStr).sort()[0];

                const highlight=isToday||isNextUp;
                return(
                  <div key={d.date}
                    className={`day-card drop-zone${isOver?' over':''}`}
                    style={{
                      borderColor: isOver?'#F97316': highlight?'#F97316': allDone?'rgba(249,115,22,.3)':'var(--border)',
                      borderWidth: highlight?2:1,
                      background: highlight?'rgba(249,115,22,.07)':'var(--s1)',
                      animation: highlight?'todayPulse 2.5s ease-in-out infinite':'none',
                    }}
                    onDragOver={e=>handleDragOver(d.date,e)}
                    onDrop={e=>handleDrop(d.date,week.id,e)}
                    onDragLeave={()=>setDragOver(null)}
                  >
                    <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:10}}>
                      <div style={{display:'flex',alignItems:'center',gap:7}}>
                        <div style={{fontFamily:"'Barlow Condensed',sans-serif",fontSize:15,fontWeight:700,color:highlight?'#F97316':'var(--td)',letterSpacing:'.05em',textTransform:'uppercase'}}>{d.label}</div>
                        {isToday&&<span style={{fontFamily:"'Barlow Condensed',sans-serif",fontSize:10,fontWeight:800,letterSpacing:'.08em',background:'#F97316',color:'#070809',padding:'2px 7px',borderRadius:3}}>HEUTE</span>}
                        {isNextUp&&<span style={{fontFamily:"'Barlow Condensed',sans-serif",fontSize:10,fontWeight:800,letterSpacing:'.08em',background:'#F97316',color:'#070809',padding:'2px 7px',borderRadius:3}}>NÄCHSTER TAG</span>}
                      </div>
                      {allDone&&!highlight&&<span style={{fontSize:12,color:'#F97316',fontWeight:700}}>✓</span>}
                      {allDone&&highlight&&<span style={{fontFamily:"'Barlow Condensed',sans-serif",fontSize:11,fontWeight:800,color:'#F97316'}}>✓ DONE</span>}
                    </div>
                    <div style={{display:'flex',flexDirection:'column',gap:8}}>
                      {d.workouts.map(wo=>{
                        const cfg=W_CFG[wo.type]||W_CFG.run;
                        const isDragging=dragWo?.woId===wo.id;
                        return(
                          <div key={wo.id}
                            className={`pill${isDragging?' dragging':''}`}
                            style={{background:completed[wo.id]?'rgba(249,115,22,.08)':cfg.bg,border:`1px solid ${completed[wo.id]?'rgba(249,115,22,.38)':isDragging?cfg.color:'rgba(232,234,240,.07)'}`}}
                            draggable={wo.type!=='race'}
                            onDragStart={e=>handleDragStart(wo,d,week.id,e)}
                            onDragEnd={handleDragEnd}
                            onClick={()=>wo.type!=='race'&&openWorkout(wo,d)}
                          >
                            <span style={{fontSize:16,color:cfg.color,flexShrink:0}}>{cfg.icon}</span>
                            <div style={{flex:1,minWidth:0}}>
                              <div style={{display:'flex',alignItems:'center',gap:5}}>
                                <span style={{fontSize:15,fontWeight:600,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{wo.title}</span>
                                {wo.km&&(stravaActual[wo.id]?(
                                  <span style={{fontSize:12,flexShrink:0,fontWeight:700}}>
                                    <span style={{color:'#FC4C02'}}>{stravaActual[wo.id]}</span>
                                    <span style={{color:'rgba(232,234,240,.3)'}}>/{wo.km}km</span>
                                  </span>
                                ):(
                                  <span style={{fontSize:13,color:'rgba(232,234,240,.6)',flexShrink:0,fontWeight:600}}>{wo.km}km</span>
                                ))}
                                {wo.routineKey&&<span style={{fontSize:11,fontWeight:800,color:ST[wo.routineKey]?.color,background:`${ST[wo.routineKey]?.color}20`,padding:'1px 5px',borderRadius:3,flexShrink:0}}>{wo.routineKey}</span>}
                              </div>
                              {wo.tags&&wo.tags.length>0&&(
                                <div style={{display:'flex',flexWrap:'wrap',gap:3,marginTop:3}}>
                                  {wo.tags.slice(0,3).map(t=><Tag key={t} t={t}/>)}
                                </div>
                              )}
                            </div>
                            <div style={{display:'flex',alignItems:'center',gap:4,flexShrink:0}}>
                              {wo.hr&&<span style={{fontSize:13,color:hrColor(wo.hr),fontFamily:"'Barlow Condensed',sans-serif",fontWeight:700}}>{wo.hr}</span>}
                              {completed[wo.id]&&<span style={{fontSize:12,color:'#F97316'}}>✓</span>}
                              {/* Move button for mobile */}
                              {wo.type!=='race'&&(
                                <button
                                  onClick={e=>{e.stopPropagation();setMoveModal({woId:wo.id,sourceDayDate:d.date,sourceWeekId:week.id});}}
                                  style={{background:'none',border:'none',color:'var(--tf)',cursor:'pointer',fontSize:12,padding:'0 2px',flexShrink:0,lineHeight:1}}
                                  title="Verschieben">→</button>
                              )}
                            </div>
                          </div>
                        );
                      })}
                      {(stravaExtras[d.date]||[]).map(ex=>{
                        const cat=stravaCat(ex.type);
                        const cfg=W_CFG[cat]||W_CFG.run;
                        const km=ex.distance>0?(Math.round(ex.distance/100)/10)+'km':'';
                        const label=ex.name||STRAVA_LABEL[ex.type]||ex.type;
                        return(
                          <div key={ex.id} className="pill" style={{background:'rgba(252,76,2,.07)',border:'1px dashed rgba(252,76,2,.45)'}}>
                            <span style={{fontSize:16,color:'#FC4C02',flexShrink:0}}>{cfg.icon}</span>
                            <div style={{flex:1,minWidth:0}}>
                              <div style={{display:'flex',alignItems:'center',gap:5}}>
                                <span style={{fontSize:15,fontWeight:600,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{label}</span>
                                {km&&<span style={{fontSize:12,color:'#FC4C02',fontWeight:700,flexShrink:0}}>{km}</span>}
                                <span style={{fontFamily:"'Barlow Condensed',sans-serif",fontSize:9,fontWeight:800,letterSpacing:'.08em',color:'#FC4C02',background:'rgba(252,76,2,.15)',padding:'1px 5px',borderRadius:3,flexShrink:0}}>STRAVA</span>
                              </div>
                            </div>
                          </div>
                        );
                      })}
                    </div>
                  </div>
                );
              })}
            </div>
          </div>
        )}

        {activeTab==='zones'&&<ZonesTab/>}
        {activeTab==='overview'&&<OverviewTab plan={plan}/>}
      </div>

      {/* ── BOTTOM NAV (mobile) ───────────────────── */}
      <nav className="bottom-nav mobile-only">
        {[['plan','▶','Plan'],['zones','♡','Zonen'],['overview','◻','Übersicht']].map(([t,ic,l])=>(
          <button key={t} className="bottom-nav-btn" onClick={()=>setActiveTab(t)}>
            <span style={{fontSize:20,opacity:activeTab===t?1:.3,color:activeTab===t?'#F97316':'var(--text)'}}>{ic}</span>
            <span style={{fontSize:10,fontWeight:700,fontFamily:"'Barlow Condensed',sans-serif",letterSpacing:'.05em',color:activeTab===t?'#F97316':'var(--td)'}}>{l}</span>
          </button>
        ))}
      </nav>

      {/* ── MODALS ───────────────────────────────── */}
      {renderModal()}
      {moveModal&&(
        <MoveModal
          woId={moveModal.woId}
          sourceDayDate={moveModal.sourceDayDate}
          sourceWeekId={moveModal.sourceWeekId}
          plan={plan}
          onMove={moveWorkout}
          onClose={()=>setMoveModal(null)}
        />
      )}
      {stravaSetup&&(
        <StravaSetupModal
          onClose={()=>setStravaSetup(false)}
          onConnect={(cid)=>{window.location.href=stravaAuthUrl(cid);}}
        />
      )}
      {debugOpen&&(
        <div onClick={()=>setDebugOpen(false)} style={{position:'fixed',inset:0,background:'rgba(0,0,0,.75)',zIndex:200,display:'flex',alignItems:'center',justifyContent:'center',padding:16}}>
          <div onClick={e=>e.stopPropagation()} style={{background:'var(--s1)',border:'1px solid var(--border)',borderRadius:8,padding:16,maxWidth:560,width:'100%',maxHeight:'80vh',overflow:'auto'}}>
            <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:12}}>
              <div style={{fontFamily:"'Barlow Condensed',sans-serif",fontSize:18,fontWeight:800,color:'#FC4C02',letterSpacing:'.02em'}}>STRAVA DEBUG</div>
              <button onClick={()=>setDebugOpen(false)} style={{background:'none',border:'none',color:'var(--td)',fontSize:20,cursor:'pointer'}}>×</button>
            </div>
            <div style={{fontSize:12,color:'var(--td)',marginBottom:12,lineHeight:1.5}}>
              <b style={{color:'var(--tx)'}}>{lastActsRaw.length}</b> Aktivitäten geladen · letzter Sync: <b style={{color:'var(--tx)'}}>{lastSync||'—'}</b><br/>
              Plan-Range: {(()=>{const ad=plan.flatMap(wk=>wk.days.map(d=>d.date)).filter(Boolean).sort();return ad[0]+' bis '+ad[ad.length-1];})()}
            </div>
            <div style={{display:'flex',flexDirection:'column',gap:6}}>
              {[...lastActsRaw].reverse().slice(0,20).map(a=>{
                const known=stravaCat(a.type)&&(STRAVA_RUN.includes(a.type)||STRAVA_STRENGTH.includes(a.type)||STRAVA_MOBILITY.includes(a.type));
                return(
                  <div key={a.id} style={{fontSize:11,padding:'7px 9px',background:'rgba(232,234,240,.04)',border:`1px solid ${known?'rgba(252,76,2,.25)':'rgba(248,113,113,.45)'}`,borderRadius:4,fontFamily:'monospace'}}>
                    <div style={{color:'#FC4C02',fontWeight:700}}>{a.start_date_local?.slice(0,16).replace('T',' ')||'?'}</div>
                    <div style={{color:'var(--tx)'}}>{a.name}</div>
                    <div style={{color:'var(--td)',marginTop:2}}>
                      type: <b style={{color:known?'#22c55e':'#F87171'}}>{a.type}</b>
                      {a.sport_type&&a.sport_type!==a.type&&<span> · sport_type: <b>{a.sport_type}</b></span>}
                      {a.distance>0&&<span> · {(a.distance/1000).toFixed(2)} km</span>}
                    </div>
                  </div>
                );
              })}
              {!lastActsRaw.length&&<div style={{color:'#F87171',fontSize:12,padding:8}}>Noch nichts geladen — Strava-Pille tippen oder Seite neu laden.</div>}
            </div>
            <div style={{fontSize:10,color:'var(--tf)',marginTop:12,lineHeight:1.5}}>
              <span style={{color:'#22c55e'}}>Grün</span> = bekannter Type (matched). <span style={{color:'#F87171'}}>Rot</span> = unbekannter Type (wird übersprungen — sag mir den Type, dann mappe ich ihn).
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
